皮曬乾捻成條子燒灰點翳重者亦效洗眼方時眼龍膽草杏仁歸尾防風荊芥甘草各三分上藥加膽礬少許開水沖帶熱熏洗三四次愈青盲數十年方白母狗待生子時即以犬乳頻頻點之小犬目開人目亦開明目方治眼目昏暗不明十二月桑葉不下地者煎湯洗之自亮留數片至九月念三日洗之能令一生無目疾眼中起星方取老荸薺捶碎絹濾汁紙上待乾成粉刮取點數次即去小兒瞳神轉背方親父右手中指尖刺血滴入即如舊龍乳膏治一切目疾龍膽草一斤銅鍋煎成膏用上號白蜜收之每兩入冰片五分磁器盛之勿泄氣臨時取出用壯健婦人乳調開點之立效散治一切風火熱毒羞明多淚疼痛難開並左右頭風等症羊躑躅花五分鵝不食草一兩蘇州薄荷五分風花硝五分青黛一錢細辛一錢白芷一錢黃連三分荊芥五分石膏煅一錢當歸一錢上為極細末先吸冷水一口後吹入藥末左患吹左鼻孔右患吹右鼻孔日二三次打嚏而愈時眼仙方甘蔗一節連皮挖一孔入川連三分人乳傾滿炙至裡面滾時入明礬少許抹眼三次即愈落星障方鵝不食草塞鼻中星障自落七日無不效又方番尾草即黃狗尾草子入眼中轉下翳障取出用水濕剝去皮可再用雞盲眼方蘿蔔子一兩豬肝半斤不見水用布袋包卜子錘碎同肝入罐內煮熟去蘿蔔子加蓮肉四十九顆燈心一圓煮一炷香取出空心淡食不過二三服愈如童子用牛肝婦人用羊肝又方小兒不肯吃焙乾為丸穀精草一兩羊肝一具入瓦罐煮熟食羊肝忌鐵器耳病門耳出膿方蛇蛻多少不拘新瓦焙黑存性研細末先將竹絲絞綿絮捻淨膿水吹入蛇蛻少許二三次愈又方油胭脂水粉同拌勻用手捻碎成末吹入三四次其效如神耳閉作痛方田螺去蓋入麝香五釐自化成水滴耳即愈耳聾方治腎虛耳聾數年久者俱效小蠍四十九個薑切片如蠍大四十九片同炒以姜干為度研成細末溫酒調服至二更時再進一服令醉亦妙一二日耳中似笙簧之聲耳便通矣年久耳聾方雄鼠膽汁入麝少許傾耳中能開三十年耳閉如不得用龜尿滴之亦大有奇效透鐵關法治耳聾活磁石二塊銼如棗大一頭略尖抹麝少許於尖上塞兩耳孔中口噙生鐵一塊候一時兩耳氣透颯颯有聲為度用三五次愈耳底毒方番木鱉仁麻油磨滴入耳內覺熱即換耳疔方荔枝煅存性為末麻油調敷耳外內疔即消鼻症門鼻衄方紙數十層水浸濕安項中以火尉之紙干立止又方用線扎中指根節上左鼻孔血出則扎左手指右鼻孔血出則扎右手指兩鼻孔出血則左右並扎之隨扎隨止又方兼治虛火上升眼目腫脹大有神效大蒜二個搗貼足心患左貼右足心患右貼左足心兩管出血並貼為妙又方山梔子燒灰吹之又方血餘燒灰吹之立止永不再發男用母發女用父發又方蘿蔔菜乾二兩豬精肉四兩濃煎飲之即止纍效又方栗殼燒存性研末粥飲下二錢立止鼻紅方蓼草根一團塞鼻孔內一時辰則終身不發鼻痔方明礬一兩萆麻子七個鹽梅五個麝香少許搗為丸綿裹塞鼻內令著息肉候化清水出四邊玲瓏息肉自下又方輕粉一錢杏仁去皮尖一錢雄黃五分麝香少許為末蜜調點息肉上夜臥時用鼻血不止方側柏葉二兩用明礬四錢河水一碗煮乾地榆炒六錢敗棕灰煅存性一兩為末紅棗肉搗成丸每日服三錢鼻塞不知香臭方皂角辛夷石菖蒲等分為末綿裹塞鼻中辛夷散治腦漏如神辛夷川芎防風木通去節細辛藁本升麻白芷甘草各一錢共為末清茶調下三錢鼻中息肉有毛方藕節一塊燒灰存性為末竹筒吹之化為水甕鼻塞內方乃肺氣大盛所致枯礬末綿裹塞鼻數日自消如鼻中肉墜痛不可忍枯礬加磠砂少許吹鼻中化為水腦瀉流涕鼻中時時流臭黃水腦痛名曰控腦痧有蟲食腦中也絲瓜藤近根三五尺燒存性為末每服一錢溫酒下以愈為度鼻淵方辛夷五錢蒼耳子二錢五分甘草一兩生薄荷一錢共為末蔥茶湯下每服一錢口齒門口瘡方黃柏五倍子各一錢微炒為末加冰片少許擦之頰車不能開合方醉之睡中用皂角末吹其鼻嚏透自合人咬舌斷方蟹一隻煅存性沒藥和勻先用木賊草煎湯洗後將藥敷即長如舊止舌血方治舌上出血如簪孔者香薷一握煎濃汁飲治心煩躁熱並效或用槐花炒為末摻之重舌方兼治牙關緊急金錢薄荷焙乾一錢青黛三分冰片一分二釐火硝二分硼砂五分殭蠶一大條瓦焙乾去火毒壁錢即喜子窠陳久者妙火煅一分共為末吹舌上下立消口疳方人中白八分青黛五分雄黃二分冰片五釐上藥共研末敷患處收舌方治舌脹出口外雄雞冠刺出血以盞盛浸或用筆蘸塗或用百草霜敷之又真冰片研末敷舌上即收齒縫出血方麥冬不拘多少煎湯頻漱以止為驗千金一笑散治牙疼不可忍登時即止巴豆一個入火略燒去殼胡椒三粒同搗爛用薄帛包藥入口上下痛齒咬定流出涎水勿咽良久取出即止若是一二個牙痛多是蟲牙去胡椒加花椒妙牙痛煎方甘草五分防風青皮荊芥各一錢丹皮生地升麻各二錢上七味為主再看何牙痛加入何藥煎服如上門牙痛加麥冬黃連之類余仿此上牙左盡膽羌活膽草下牙左盡肝柴胡梔子左中胃石膏白芷左中脾白朮白芍正門牙心麥冬黃連正門牙腎黃柏知母右中胃石膏白芷右中白朮白芍屬脾右盡大腸大黃枳實右盡黃芩桔梗屬肺上藥竹葉姜為引二帖愈如滿口痛加人參五分牙痛立止方辛夷花椒蜂房防風各等分上藥煎湯漱之立止又方蟾酥一分冰片少許上研細末擦之神效又方蜂房不去子入鹽於內煅紅研末擦牙止痛又方蜂房一個花椒一撮煎湯漱之哭來笑去散川芎雄黃乳香去油沒藥去油生石膏各二錢硝五錢上藥共為末左牙疼以半匙吹入右鼻孔右牙疼則吹入左鼻孔急解奇方也蠶