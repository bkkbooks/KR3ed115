body:
  text: 卷二諸風門豨蘞丸五月五日六月六日九月九日採草單取葉莖入甑層層灑酒與蜜水九蒸九曬為末蜜丸每服二三錢米湯下百日見效此藥專治周身癱瘓風疾口眼歪斜痰涎壅塞久臥不起又能明目黑髮加味養生方主治手足麻木疼痛牛膝枸杞生地杜仲菊花萸肉白芍各二兩五加皮桑寄生各四兩圓眼肉八兩木瓜歸身各一兩桂枝三錢火酒三十斤浸七日服風痛酒方防風秦艽鱉甲晚蠶蛾虎脛骨牛膝各七錢羌活三錢當歸一兩二錢油松節一兩萆薢一兩枸杞一兩五錢茄根二兩五錢蒼耳子一兩二錢燒酒十斤浸一日煮一二炷香埋一宿服大夫酒治風腰腳疼痛不可踐地並治中風口眼歪斜及歷節痛風俱宜久服松葉搗一斤酒三升浸七日每服一合日二服或切細為末酒下二錢或蜜丸俱可祛風藥酒方生地當歸枸杞丹參各一兩熟地一兩五錢茯神地骨皮丹皮川芎白芍女貞子各五錢米仁杜仲秦艽續斷各七錢五分牛膝四錢桂枝二錢五分圓眼肉四兩黃酒二斗絹袋盛藥浸七日隨用二因勝駿丸治元氣虛弱血脈凝滯以致筋骨痿痹或因風濕侵襲致成鶴膝漏蹄等症或因跌打損傷瘀血未散以致脈絡拘攣走注疼痛步履艱難以此治之百試百效久服筋骨壯健行走如飛妙難盡述附子一枚一兩之外製明天麻牛膝棗仁當歸熟地防風木瓜四兩麝香一錢乳香木香沒藥羌活炙甘各五錢檳榔川萆薢肉蓯蓉破故紙巴戟去心蒼朮全蠍淨身各一兩上為細末蜜丸梧子大每服七十丸空心淡鹽湯溫酒任下病近者七日年深者半月見效扶桑煎治風熱臂痛桑枝一斤切片炒水三升煎一升半一日服盡簡易方治一切手足風痛及酒腳風痛薑汁蔥汁各一碗醋一小碗牛皮膠八兩慢火同三味煮成膏青布攤貼痛處即愈一方加蒜汁急性花汁各一碗更佳忍冬膏治濕氣流注之處痛不可忍金銀花並葉和酒糟研爛用淨瓦攤火上烘熱敷患處鳳仙酒治風痛白鳳仙花四兩曬乾浸火酒一埕飲完愈又方用白鳳仙花九朵每朝嚼爛溫酒送下七味無價仙方雄黃南星半夏川烏草烏硃砂再加一味白天麻每服三分酒下不論手足頑麻不論口眼歪斜渾身風痹自堪誇萬兩黃金無價千金不換餅治手足拘攣雖跛至十餘年者俱效雄黃五分細辛官桂牙皂川烏羌活骨碎補白附子各一錢蒼朮一錢麝香三分水和作餅棋子大先將筷頭點患處凡遇痠痛異常即系受病之源或一二處以墨記之用藥餅安上以艾灸之以筋脈能動而止半身不遂方白蒺藜半斤微炒去刺捶碎水煮一滾放雞蛋十個再煮視雞蛋浮起為度單吃雞蛋數服即愈治鶴膝風方兼治痢後鶴膝用虎食余狗頭煅存性陳糟搗敷神效又方甘菊花蘄艾作踝膝用久其病自除雞蘇丸治男婦諸風上攻頭目昏重偏正頭風風痛雞蘇薄荷葉八兩川芎荊芥各四兩羌活防風香白芷炙甘各二兩細辛一兩為末蒸餅糊為丸每服二錢清茶下半邊頭風方石菖蒲根搗汁酒沖服至多不過三四服愈如無鮮者即以乾者水搗汁亦可又方金銀花桑葉茄杆俱要經霜雪者夏枯草各八兩煎湯一大鍋患人於不通風房內浴盆盛洗淋得爽快冷則換湯自愈偏正頭風方白槿樹花子三錢殭蠶升麻款冬花天麻各一錢半蔥頭三個姜皮三片水二杯煎八分先薰鼻眼待溫即服如頭痛甚者鬚髮汗輕者不必發汗四服愈內府頭風方蘿蔔搗汁用一匙入麝少許仰臥注鼻孔左痛注右右痛注左兩邊俱痛二孔俱注即愈又方治偏正頭風老鼠洞口泥炒熱乘熱絹帕包頭上即愈半肢風方半邊身冷用真正廣西桑寄生緩則浸酒溫服急則酒煎服忘痛湯治遍身骨痛時止時痛黃耆一兩當歸五錢肉桂一錢有火者用桂枝元胡索五分花粉五分秦艽五分水煎服二三帖愈鬼箭風方身痛有青痕以亂髮擦之髮捲成團而硬者方是如不卷硬者非是金銀花一兩煎湯飲之立愈兼治鬼擊五龍針治鶴膝半肢風並無名腫毒初起跌閃神效硫黃五錢皂角一錢硃砂一錢雄黃一錢五分上藥為末惟將硫黃煬化入藥末在內再加麝香三分傾出綿紙撳薄片用錢一個以藥四五釐放錢孔內香火點灸之三五次愈厚皮風方苦參不拘多少用無灰酒煎湯去渣洗之數日而愈或用前汁將末調敷患處其效尤速大麻風方龍吞虎即以竹削尖拴定勿令吐出活浸火酒罈中蓋好過一宿重湯煮三炷香埋一日去火氣每飲三五杯數日即愈一罈酒可治數十人不獨大麻風諸風並效即赤蠊蛇吞蛤蚆煮鴨方治大麻風手足拘攣發眉盡落大雄鴨一隻火蠊蛇長尺余者三四條將鴨餓一二日次早將蛇寸斷與食俟鴨腹蛇化盡即殺鴨干拔毛去腸留肫血等用酒加作料煨熟吃之再飲數杯令微醺護暖取汗令透避風數日至重者不過吃二三隻愈麻風下法大黃一兩煨為末每服三錢空心溫酒下瀉惡物如魚腦或有蟲如亂髮候蟲盡乃止此藥醉仙散治風痰遍身癮疹瘙癢麻木毛髮脫落楊梅瘡誤服輕粉而成此症者並效胡麻子牛蒡子枸杞蔓荊子各一兩同炒白蒺藜苦參栝蔞根防風各五錢共為末每末一兩加輕粉一錢和勻每服一錢茶調下晨午夕各進一服後五七日牙縫流出臭黃涎及渾身疼痛昏悶如醉勿訝次後再利下膿血惡臭之物病根乃除鵝掌瘋方桐油三錢鹽滷和勻搽之外用紙板火薰之又方輕粉槐子核桃肉棗仁各一錢共搗為丸分二十一丸每服七丸第一日公雞汁送次酒次開水送三日藥盡即愈又方生桐油抹上用牙香薰之數次即皮脫手好永不再發又方黃丹輕粉各三錢用豬臟頭燒油調藥搽之風癬即除或用生豬油搗赤石脂末為丸擦之即愈又方鮮蟹水洗手即愈又用明天麻煮汁熱洗擦效又方並治寒濕血風水龍骨即舊船縫拆下油灰煅研末麻油調塗立愈紅白癜風硫黃末白附子薑汁和勻茄子帶蘸藥擦之紅癜用紅茄白癜用白茄二三次即愈白癜風方雄黃硫黃各五錢南星黃丹各三錢枯礬密陀僧各二錢共為細末先以薑汁擦患處後以姜蘸藥末擦之肉漸黑次日再擦黑散即愈紫癜風方宮粉五錢硫黃三錢為末雞子清調擦癲癇門逐癇丸靈砂九錢乳香二錢膽南星四錢川連一錢上為末以南蛇膽二分入豬心血研開和丸如粟米大每服五分臨臥時橘皮湯下救癇丸山藥人參遠志防風紫石英茯神虎骨虎睛龍齒丹參石菖蒲細辛五味子各二錢五分珍珠四分辰砂二錢為衣以上各照古制為末神麯糊丸如緑豆大每服五六十丸清湯早晨送下安神丸附子三分人參三錢白朮三錢陳皮一錢歸身五錢硃砂一錢鐵衣水飛一錢茯神三錢遠志一錢半夏一錢薄荷一錢花粉一錢膽星一錢川連二錢上為末蜜丸薑湯送下一錢日進一服藥完愈鎮神丹人參二兩白朮二兩五錢歸身生棗仁生地茯神麥冬去心各一兩五錢熟地四兩遠志虎睛一對煅龍骨煅白芥子柏子仁各五錢去油陳皮一錢五分上蜜丸早晚清湯下五錢心腎兩交湯徹夜不眠用之熟地五錢萸肉棗仁各四兩人參當歸白芥子麥冬各二錢五分肉桂黃連各二分水煎服靈砂安神丸兼治心腎不安怔忡恍惚妄事驚悸恐怖常服日記萬言又治吐血勞瘵怯弱神效靈砂一兩一半留為衣茯神乳制遠志棗仁炒生地麥冬石菖蒲熟地天冬各二兩熊膽八錢上為末蜜丸如梧子大靈砂為衣酒下五十丸一方加川連五錢益智仁鹽水炒去殼乳霜人參各一兩如無參加黃耆二兩柏子仁二兩去油當歸二兩以圓眼膏和蜜丸硃砂金箔為衣亦佳失心方治痰入心竅黃連二錢鬱金二錢煎濃汁礬三錢為末將前汁送下三服後服補中益氣湯十帖愈又方治失心蝦蟆煅存性硃砂等分為末每用一錢水調服神效豬羊癇方牙皂八兩去弦取不落水豬肝一具同煮一二炷香取出豬肝將牙皂曬乾為末明礬四兩檳榔二兩共為末神麯糊為丸如緑豆大每早晚各一錢細雨前茶送下羊癇用羊肝化痰丸治風痰癇病生白礬一兩入豬膽內陰乾細辛五錢為末蜜丸桐子大一歲十丸茶湯下大人五十丸久服痰自大便中出癇病神方昔一婦人病狂十年遇異人授此方初服心間如有物脫去神氣灑然至再服而愈亦治男婦抑鬱顛狂及風痰迷悶鬱金七兩明礬三兩為末麵糊為丸滾水下三錢藥完愈醒迷至寶丹白真人方治痰迷心竅呆癡狂癲不論新久多服除根至效如神膽星三錢硃砂三錢水飛為衣金箔十張生棗仁三錢遠志茯神三錢柴胡三錢半夏曲二錢川貝母二錢廣皮一錢天花粉三錢生甘草一錢木香一錢砂仁一錢共為末蜜丸梧子大硃砂為衣每日清晨清湯下三四十丸青筋門備急丸治沙肚痛真茅朮去皮尖母丁香雄黃硃砂各淨末六分蟾酥六分將蟾酥火酒開化共研成丸如芥子大每用一粒置舌尖上藥化痛止重者二服烏沙脹方真麻油一鍾溫服即止馬土散白馬糞煅存性每用五錢入黃土新五分能飲者溫酒調服不能飲酒溫湯調服即刻止痛絞腸痧方用好明礬末溫水調服三五錢即愈或用胡椒緑豆各二十四粒同研酒調服即愈乾霍亂方用千里馬煎湯飲之即吐急治轉筋霍亂法上不吐下不瀉肚痛腳筋吊者是也急將病人頂發分開以緑豆粉調井水不住手拍頂心上又將滑石緑豆粉調水服即愈絞腸痧法凡陰痧則腹痛而手足冷看身上有紅點以燈火爆之陽痧則手足熱用針刺指甲出血即痊用炒鹽一兩或數錢以陰陽水一鐘調服或吐或瀉即止平痧丸治痧脹霍亂吐瀉轉筋並傷暑心胃痛等症藿香葉一兩茅朮三錢米泔浸陳皮五錢炒枳殼一兩炒厚朴八錢薑汁炒生半夏五錢生甘草三錢滑石水飛二兩蘇葉一兩薑汁炒二蠶砂二兩草紫河車一兩炒以上諸藥再用青蒿汁浸三四次青皮五錢炒川貝去心五錢麝香一錢上藥共為末薑汁為丸約重二錢硃砂為衣每服一丸燈心湯下小兒量減孕婦忌服消渴門加減四物湯丹溪云三消多屬血虛不生津液宜四物湯為主間服繅絲湯更妙熟地當歸白芍川芎各三錢上消者加人參五味子麥冬天花粉煎入生藕汁生地黃汁人乳飲酒人加葛根汁中消者加知母石膏寒水石以降胃火下消者加黃柏知母熟地五味以滋腎水繅絲湯即蠶繭做絲湯如無即以原繭殼絲綿煎湯皆可代渴則飲之大效蓋此物屬火有陰之用能瀉膀胱伏火引陰水上潮於口而治消渴也清涼水田螺五升水一斗浸過夜渴則飲水每日換水浸飲二冬湯治肺消氣喘痰嗽面紅虛浮口爛咽腫飲水過多飲訖即溺麥冬一兩天冬四錢茯苓一錢五分車前子一錢用水煎服一二十劑愈平胃滋腎湯治胃消大渴多飲嘈雜易飢得食稍減熟地元參麥冬各八錢石膏三錢青蒿二錢水煎服十劑渴減一月全愈引龍湯治腎消多飲多溺口吐清痰投水即散面熱唇紅口舌不峭此下部虛寒逼火上升故作大渴水泛為痰故痰清而易散元參一兩肉桂一錢萸肉一錢五分麥冬三錢水煎連進三劑渴減十劑全愈止氣湯治同上熟地一兩肉桂七分茯苓三錢丹皮三錢麥冬六錢水煎服五六劑即愈痰喘門滌痰散此藥清肺消痰定嗽解酒除毒一切痰火神效廣陳皮先用泉水洗淨每一斤入食鹽四兩同入水浸過一指鍋內煮乾略去筋膜切作小片炒乾每陳皮一兩入甘草二錢共為末每日早晚服二匙白湯調下萊子丸治風痰咳喘或吐膿血並老人痰喘蘿蔔子一兩炒研細末杏仁五錢去皮尖共搗爛加蜜丸梧子大每服一錢清湯下化痰止嗽方治陰虛火嗽絲瓜燒存性為末棗肉和丸彈子大每服一丸酒化下如神湯治肺熱氣喘生茅草根一握打碎水二盞煎一盞食後溫服甚者三服止又方白果煨食大能降痰定喘溫肺天蟲散治風痰咳嗽夜不能