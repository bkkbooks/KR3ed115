碎加白糯米一撮水三碗煎清粥二碗入老醋半小盞乘熱飲之待汗大出而愈但未食粥前必問病人肚內飽脹不思飲食者即不可用糯米單以蔥姜煎服可也姜尉法治傷寒胸膈不寬作痛一切寒結熱結食結痰結痞結水結等症生薑搗爛去汁將渣炒熱絹包漸漸揉尉心胸脅下其痛豁然自開如姜冷再添汁炒熱再尉如熱結微炒如大小便結尉臍腹又華他救卒病方用蔥白炒熱尉臍再以蔥白三寸研爛用酒煎灌之陽氣即回兼治陽脫陰毒傷寒四肢逆冷方吳茱萸一升酒拌濕絹袋二個包蒸極熱更換尉足心候氣透即止陰症傷寒方蔥八兩麥麩一斤鹽一斤乾薑四兩共炒熱青絹或布包尉臍稍冷再炒熱尉以手足暖至有脈為度陰陽易方傷寒愈後男女交感而無恙者反得病其症手足俱急名曰陰陽易乾薑為末調服數錢覆被出汗愈發汗方乾薑黃丹枯礬胡椒各三錢上共為末用滴燒酒為丸一服分作二丸男左女右置手心上按會陰穴片時即出汗足心有汗方止去藥凡一切病不能發汗者皆可用此方會陰在穀道前腎囊後正中間即是消跗散治腳氣傷寒其症兩跗忽然紅腫因而發熱兩脛俱浮作痛蓋因感染濕熱先從下受但消其濕熱從膀胱下行則身熱自退切不可用風藥散之恐致上升不可救矣茯苓八錢薏苡八錢茵陳防己梔子各八分澤瀉二錢五分木瓜八分上用水煎服三劑便利熱退五劑腫消十劑全愈順導湯治同前茯苓澤瀉各五錢肉桂三分木瓜膽草各一錢車前子去殼淨三錢水煎六七劑愈陰症方老油松節七兩捶極碎胡椒每歲七粒雞蛋二個水三四大碗同蛋煮熟先將汁半茶杯與病者服之次將蛋一枚磨其胸腹冷則易之二蛋互換以胸膈爽快為度能變陰為陽又方丁香油塗其前心後心臍輪丹田腰眼並小腹兩邊頂門會陰湧泉各處大能驅陰中之邪發汗感冒門薑茶散姜五片細茶一錢冰糖二錢水煎熱服被蓋取汗五神湯荊芥二錢蘇葉二錢細茶一錢姜三錢冰糖三錢水煎服被蓋取汗蔥姜煎蔥十枝去根葉姜三錢煎一大碗入酒一小鐘取汗武當救世丸治天時不正傷風傷寒初起瘟疫時氣頭痛身熱咳嗽骨痛並惡毒生髮身上寒熱等症生何首烏赤色川芎羌活川烏草烏細辛生甘全蠍荊芥防風天麻當歸石斛麻黃各一兩茅山蒼朮八兩上各依古法炮製為末蜜丸再用硃砂雄黃各五錢為衣每丸重一錢五分大人二丸小兒一丸或半丸姜二片蔥白五根煎湯調服被蓋取汗甚有功效孕婦忌服瘟疫門凡遇疫染以初病人衣放甑上蒸之則一家不染內庭奇方蒼朮良薑枯礬各等分為末每用一錢以蔥白一個搗勻塗手心男左女右掩臍上藥勿著肉又以一手兜住外腎前陰女子亦如之煎緑豆湯一碗飲之點線香半炷可得汗如無汗再飲緑豆湯催之必汗出而愈然後調理內府解瘟丹端午夏至前後燒一二丸能遠疫鬼及蛇蠍毒物蒼朮八兩明雄黃二兩白芷四兩肉桂一兩艾葉四兩三月三日收者佳乳香藝香甘松三奈唵叭香各一兩硫黃五錢共為細末用榆面三合加紅棗煮爛去核同煮如糊搗丸陰乾收好遇有時行日焚一二丸極妙須端午制疫症方治身熱發狂苦參十斤上好燒酒十六斤小缸內拌貯蓋好過夜炒燥或烘乾磨末水發為丸緑豆大每服二錢或一錢五分滾水下一方用苦參二兩酒煎熱服或吐或不吐或汗或不汗俱愈解邪丹虎頭骨二兩硃砂雄黃雌黃鬼臼蕪荑鬼箭羽藜蘆各一兩上為末蜜丸彈子大囊盛一丸系右臂上或於病人戶內燒之一切邪祟遠避疫毒下痢方松花二錢薄荷葉煎湯入蜜一匙調服四時瘟疫方黑沙糖一鍾薑汁一鍾滾水一鍾攪勻令病人乘熱服之當即增寒熱發汗而愈福靛散治大頭瘟項腫腮大形如蝦蟆靛青花三錢雞子清一個燒酒一碗共打勻吃下即愈真神方也中風門釋麻丸專治指麻臂冷忽覺一時昏瞶及頭暈眼花服此以預防白朮二兩荷葉包蒸三次廣皮八錢山楂五錢川連五錢吳茱萸拌炒去萸炙甘草八錢黃芩酒炒七錢木香一錢枳實八錢麩炒蒼朮二兩茅山者佳米泔浸曬三次鹽水拌勻茯苓一兩人乳拌蒸人參七錢半夏八錢白礬湯姜同煮當歸一兩酒洗白芍一兩酒拌炒經霜桑葉四兩去筋為細末竹瀝薑汁荷葉汁打神麯糊為丸梧子大空心服二錢開水送忌豬首鵝肉發風動痰物一年後可免中風之患白虎散治中風兼治小兒急驚生石膏十兩辰砂五錢共研細和勻大人每服三錢小兒一歲至三歲一錢四歲至七歲一錢五分八歲至十二歲二錢十三歲至十六歲二錢五分俱用生蜜調下中風方治口噤痰厥不省人事辰砂白礬等分共為末三伏時內裝入豬膽掛透風處陰乾每服豆許一粒涼水溶化灌下即愈然後可加調治又方荊芥穗略焙乾為末酒下二錢立愈礞石化痰丸治中痰並一切痰症大黃二兩九蒸礞石二兩煅乳淬沉香一兩半夏二兩姜礬制陳皮二兩黃芩二兩酒製為末陳米糊為丸緑豆大每服三錢中風口喎方皂角五兩去皮為末三年陳醋和之左喎塗右右喎塗左干更塗之救右湯治中風後右手不仁或口角流涎不能言語等症白朮五錢人參二錢五分黃耆五錢半夏八分茯苓一錢五分炙甘草三分附子三分陳皮三分水煎服三劑出聲五劑收涎連服二十劑全愈此方亦治女子左手不仁救左湯治中風後左手不仁或目不識人等症熟地一兩白芍五錢柴胡三分花粉一錢五分水煎服四五劑效十劑大效一月全愈此方亦治女子右手不仁理氣化痰湯治無故身倒肉跳心驚口不能言足不能動痰聲如雷此氣虛中痰也人參二錢黃耆四錢歸身二錢白芍一錢五分茯苓二錢白朮二錢炙甘四分熟地四錢川芎八分肉桂八分水煎服二劑能言再二劑而痰聲息再二劑而手足活動一月全愈尉法治陰陽脫症凡吐瀉之後四肢厥冷不省人事或男女交合小腹疼痛外腎縮入冷汗大出須臾不救又中風昏迷不醒又陰毒腹痛厥逆唇青卵腫脈絶皆治之生蔥一二斤截去其葉須留中段四寸許用繩縛之分二束放鍋內蒸熱不見水取起患人臍上尉之又將次束置鍋內此束冷則換之如此數次病人鼻氣略聞蔥氣即醒一切急中風陰脫風寒無有勝此者如無蔥以蒜代如上法亦好又用生薑搗爛加鹽四兩炒熱布包尉亦作二包換之中暑門黃金丹治中暑發痧霍亂痢疾等症神效川連二兩四錢黃芩二兩一錢酒炒乾薑一兩二錢香附醋製砂仁丁香木香各三錢檳榔六錢車前六錢澤瀉三錢鹽水炒川貝六錢蓽茇陳皮麥芽炒荊芥穗各三錢共為細末用新荷葉搗汁或乾者煮汁亦可打麵糊為丸每料作一百丸每丸可治二人冷水調服房事者用溫湯下忌炭火鐵器百發百中中暑方街上熱土童便攪勻灌之即蘇又地漿水服之愈將地掘一坑入清水攪之即是又以熱土圍臍四周令人溺臍上即蘇香薷丸香薷三兩薄荷葉二兩硼砂二兩柿霜二兩粉甘草一兩烏梅肉二兩藿香二兩共為細末白糖白蜜為丸每丸重一錢噙化或冷水下中暍方青蒿五錢茯神白朮各三錢香薷知母乾葛各一錢甘草五分水煎服一劑氣通二劑熱散又方香薷茯苓各二錢甘草黃連各七分白朮五錢白扁豆二錢白豆蔻一粒水煎服一劑即愈吐血門吐血不止方白茅草根一握水煎服之又方百草霜五錢槐花米二兩每服二錢茅根湯下百草霜即人家鍋底煤也鄉外人家長燒百草要住居山場更好止一切吐血衄血取其紅見黑即止此藥火中有水性輕浮無毒不傷臟腑又方白薄紙五張燒灰水服效不可言此方極奇又方上下諸血通治或吐血或心衄或內崩或舌上出血如簪孔或鼻衄或下便出血並用亂髮燒灰水服二錢一日三服又方韭菜搗汁一盞童便半盞頓熱服一二次立止男婦吐衄不止方益母草搗汁一盞童便半盞燉熱服無鮮者以乾者一二兩煎湯和童便服又方藕汁一盅蘿蔔汁一鍾溫服亦治血痢血不歸經方治血從口鼻耳眼出用現彈過新棉花五兩燒存性為末淡酒送下引血歸經方當歸酒洗三錢白芍酒炒二錢熟地五錢川芎一錢荊芥穗一錢炒黑生地酒浸五錢麥冬二錢茜草一錢甘草一錢水煎服治吐血仙方柿霜陳棕灰各一錢清湯下止血方生地一兩當歸蒸熟三錢元參五錢荊芥炒黑三錢三七一錢水煎服一劑止血肺熱咳嗽加茅根一兩麥冬三錢胃熱者加石膏五錢同煎服無不立效吐狂血方生地搗汁藕汁人乳茅根搗汁梨花蜜童便各一碗京墨六分磨入薑汁十四匙上共熬成膏每日清晨服五六錢如臨吐時亦可服瘧疾門丹陽治藥三方不拘陰陽一日二日三日及非時瘧人無老幼病無久近按方依次服之應手而愈切勿增減藥有首功有後效故分一二三而第二方實為主既不刻削又不峻補而功獨歸之第一方陳皮半夏薑汁製茯苓威靈仙各一錢蒼朮米泔浸切片炒厚朴薑汁炒柴胡黃芩各八分青皮六分檳榔六分生甘三分生薑三片河井水各一鍾煎八分空心服如頭痛加白芷一錢無汗加麻黃一錢只服一劑後去之此方平胃消痰理氣除濕有疏導開先之功輕者二劑即愈若三五劑後病雖減而不愈者必用第二方第二方生何首烏三錢陳皮茯苓柴胡黃芩各八分白朮當歸威靈仙各一錢炙甘草三分知母鱉甲醋炒各二錢生薑三片河井水各一鍾煎熟入酒半杯煎數沸空心服久瘧加莪朮一錢此方補瀉互用不用參耆屏去常山草果平平無奇卻有神效即人弱症重十劑立起切勿早用參耆須待瘧止扶元再用第三方貧家只用此方多多益善第三方人參一錢黃耆炙一錢二分歸身一錢二分白朮炒一錢陳皮八分炙甘三分柴胡八分升麻四分或加麥冬一錢青蒿子八分此二味臨時酌用加姜一片棗二枚水煎半飢服三五劑元氣充實矣初愈宜節飲食瘧疾驗方治四日兩頭尤妙川貝半夏各等分研末薑汁為丸如小龍眼大先一時薑湯送下四日兩頭方發過三四巡後一服即愈愈後宜服補藥數劑則不復發常山檳榔蒼朮陳皮各三錢雞頭梢一對水二碗煎七分入酒一鍾煎數沸露一宿臨發日五更湯燉熱面東服如不能飲者水煎亦可一方加人參一錢治之治瘧方鬚髮三五次後方可用生薑一塊搗爛入淨鍋焙成餅如茶杯底大厚二分許取置桌上略退火氣貼風門穴外用碗口大新膏藥一張四圍以手按緊貼不可絲毫走氣中間薑餅處勿按恐其散碎萬宜仔細或絲毫不緊必有冷水流出即不效俟下期再治風門穴在頸後第二骨節與第三節交縫處臨發黎明貼之即愈膏藥勿揭聽其自下截瘧方香附去毛米泔浸銼碎微火炒熟六兩草烏老薑自然汁浸切片拌炒去姜三兩二味俱揀成個完整者方用破碎半個者去之用石臼搗為末磁器收貯勿泄氣每服一分四釐滾水下須在將發未發時服如遲早俱不應應時服之即愈海上仙方番木鱉二兩面炒三次至黑去油淨用銀刀或磁片刮去毛硃砂一錢雄黃一錢甘草一錢共為末每服一分臨發日清晨溫酒送下服後吃半飽睡一覺即愈治四日兩頭神效忌鐵器服藥後須要避風如不避風令人發抖急嚼生薑咽汁或米湯或圓眼湯熱飲解之治諸瘧效方專治隔日瘧當歸二錢黃芩一錢柴胡一錢陳皮一錢半夏六分澤瀉八分茯苓一錢甘草五分生薑三片木棗三個桃腦七個向東者勿令人見用水酒各一碗煎八分露一宿溫服分兩不宜加減絶瘧膏斑蝥一個去頭足翅紅棗一個去核同搗爛包在眉心先發時半日包上過時即除下遲則起泡矣但須發過三五次後方可用此藥倘早用之恐風邪未淨終有後患瘧疾不二飲常山二錢雞油炒檳榔雌雄各一錢尖者雄平者雌知母貝母各一錢五分酒水各半鍾煎七分不可過熟熟則不效露一夜臨發日五更天溫服勿令婦人煎藥一服即止信雄丹屢試屢驗吟按此方白砒須放瓦上火煅出煙盡淨否則極毒殺人白砒二錢明雄黃八錢硃砂水飛過為衣研細末端五午時用七家粽尖為丸緑豆大硃砂為衣大人五丸小兒三丸無根水於發時早半日朝東男左手女右手持藥服之忌茶水半日即愈四日瘧亦愈一兩金治瘧如神首烏五錢當歸牛膝各一錢陳皮青皮各一錢五分水酒各一鍾煎露一夜發日五更用重湯燉熱服又方治久瘧人虛雞子二個打散入白糖一兩打勻蒸熟食之立止四日瘧方治四日瘧效斑蝥每歲一個去頭足翅密陀僧三錢研末用軟柿餅二個同搗爛臨發日五更貼臍上一日足去之又煎藥方生首烏八錢沙參三錢歸身三錢夏枯草一錢青皮八分生甘三分酒水各半盞煎發之次日服二帖愈又方白朮四兩半夏二兩為末薑汁打米粉糊為丸每服三錢服完全愈又方治四日兩頭常山三錢陳皮三錢檳榔三錢子丁香五分烏梅三個白丁香五分酒水各半盞煎雞鳴時服之止後須服補中益氣湯此藥可為末施捨截三陰瘧方胡椒三錢研為細末用砂糖少許和勻先一夜入臍內用布包緊至次日去之即愈一方椒末入臍內膏蓋十六歲用五分年小遞減至六十外亦遞減神效瘧後怪症方治口鼻中氣出盤旋不散凝如黑蓋色過十日漸至肩與肉相連堅如金石無由飲食澤瀉煎湯日飲三五次連服五日愈代赭膏治小兒瘧不能進藥代赭石五錢煅醋淬硃砂五錢人言豆大一粒紙包六層打濕煨乾入麝香少許研末香油調少許塗鼻尖眉心手腳心神效痢疾門淳于丸大黃八兩白芍四兩車前子四兩蘿蔔子八兩俱生用為末水打為丸每服三錢滾水送下虛弱及老人人參一分煎湯送下丹陽治痢三方川連黃芩括芍山楂肉各一錢二分枳殼厚朴薑汁炒檳榔青皮各八分當歸生甘草地榆各五分紅花三分酒洗桃仁一錢去皮尖研細木香二分為末上藥水煎空心服不論紅白身熱腹痛並用此方純白者去地榆桃仁加橘紅四分木香三分澀滯甚者加酒炒大黃二錢服二帖仍服此方初起三五日神效旬日內亦可若十日半月後當有加減法另詳於後第二方川連黃芩芍藥酒炒桃仁粉各六分括生芍四分山楂一錢厚朴姜炒青皮檳榔各四分橘紅四分生甘二分炙甘三分當歸五分地榆四分紅花三分木香二分水煎空心服若延至月餘脾胃虛弱而虛滑者更立一方第三方黃芩酒炒白芍各六分橘紅厚朴薑汁炒木香各三分地榆醋炒四分紅花二分人參白朮炒當歸炙甘各五分水煎空心服以上三方取效最奇婦人有孕去桃仁紅花檳榔大凡痢症一忌溫補一忌大下一忌發汗一忌分利小水禁口者毒在胃口也用首方煎熟分五六次緩緩服完使胃口毒解不惟藥可進即飲食亦可進不必用他藥也忍冬散金銀花入銅鍋內焙枯存性五錢紅痢以白蜜水調服白痢以沙糖水調服一服即愈否則亦必漸出黑糞次日霍然真神方也太和丸紅丹二兩飛淨杏仁一百粒去皮尖巴豆仁四十粒去衣油乳香去油沒藥各二錢去油各為細末黃蠟一兩二錢化開攪藥末丸如緑豆大每服十五丸紅痢甘草湯下紅白痢甘草薑湯下白痢薑湯下裡急後重白湯下水瀉米湯下如人小或虛弱人須減少用孕婦忌服薑蔥飲鳳尾草連根一大握老米一勺姜三片蔥白三根連須水三大碗煎至一碗去渣入燒酒一小杯蜜三茶匙乘熱服一小杯移時再服一杯一日服盡為度忌酸味生冷煎炒等物不分男婦老幼紅白久近一服即愈效驗如神如白多者量加蔥姜二味椿皮丸治下痢危篤或色如羊肝者服之可起死回生白臭椿根皮紅香椿根皮俱要在土內者方可用去土淨刮去粗皮微焙為末清米湯打丸如芥子大每服三錢分四五次以清米湯徐徐送下熱痢方治便血腹痛或如魚腦五色者乾絲瓜一枚連皮煅研空心酒服二錢一方煨食之瀉痢不止方亦治久痢五倍子一兩半生半熟為末糊丸梧子大每服三十丸紅痢燒酒下白痢水酒下水瀉米湯下又方山楂不拘多少去核為粉每用五錢紅痢加蜜白痢加黑沙糖俱用滾水調服立止一粒丹止痢疾水瀉脾泄尤效巴豆十粒半夏十粒丁香一錢雄黃一錢醋煮研硃砂五分為衣麝香五釐為末酒糊搗丸紅豆大硃砂為衣以茶汁潤臍納藥上蓋膏藥良久有積即行無積則止馬前散木鱉母丁香各五個麝香一分研末米湯調作膏納臍中以膏藥貼上護住噤口痢亦效封臍丹治痢疾水瀉並婦人白帶丁香七個肉果一個牙皂二兩去筋大倍子一個炒麝香五釐為末醋調為丸緑豆大入臍外貼膏藥點眼膏赤白痢疾及噤口痢危篤者皆神效初胎糞炙乾一錢雄黃四分片腦少許為極細末水調點兩眼背封臍膏大黃黃芩黃柏枳實各一兩檳榔八錢黑白牽牛各三錢當歸槐花各五錢地榆一兩木香三錢後入生薑麻油八兩黃丹四兩以上熬成膏攤貼臍上忌油膩酒漿煙面葷腥白多者先用姜三片茶葉一錢紅糖三錢煎服赤多者或口噤者用川連一錢地榆一錢茶葉八分煎服服後貼膏藥無不效藥梅方治痢神效青梅一斗砂仁四兩甘草四兩川木通八兩紫蘇四兩黃芩八兩防風八兩上好燒酒一斗將藥拌勻青梅浸酒一月每用二三枚神效金華散椿白皮一兩須臭氣者去粗皮取向東南者松花三錢共為末紅痢蜜調白痢沙糖調紅白痢糖蜜兼調滾水空心送下三錢忌厚味久痢不止方或噤口病勢欲絶者金色鯉魚一個或一二斤如常用鹽醬蔥必用加胡椒三四錢為末煮透盛於病者前令嗅其香氣欲食即令隨多少食之和湯連肉一飽即除根此方屢治多效惟久痢為宜噤口痢方蓮肉炒為末粥飯調食數次即愈又方鹿角煅存性為末三錢小人二錢好酒送下立時即思飲食又方雞肫皮焙研乳汁服之水仙散治噤口痢五穀蟲洗淨瓦焙乾為末每服二錢或一錢米湯調下即思飲食痢疾丸方鴉片淨一兩鴉膽三錢五分即苦參子剝淨肉去油人參三錢五分要頂好原枝白石榴皮燒灰存性二錢五分上好沉香一錢枯礬五分上共研細末搗勻用陳米一兩以荷葉包蒸極熟去荷葉用飯搗藥為丸重二三釐如新起者每日服三丸三四日即愈如半月後者只用一丸紅色用蜜沖滾水下白色白洋糖衝開水下紅白兼有用蜜白糖各一錢冷水一茶匙和勻滾水衝下忌魚腥苦茶七日孕婦勿服
