body:
  text: 卷一通治門原方紫金錠一名玉樞丹每一料加雄黃三錢硃砂三錢治法同下而不及原方更靈惟用敷癰勝於原方當門子三錢生麝揀去皮毛山文蛤二兩去瓤淨千金子一兩即續隨子去油殼山慈菰二兩有毛者佳去皮毛紅芽大戟一兩五錢去蘆洗淨杭州紫大戟為上江南者次之北方綿大戟勿用上為極細末糯米粉煮糊入臼同搗千餘下印錠錠重一錢每服一錠重者連服二錠取通利後以溫粥補之孕婦忌服一切飲食藥毒蟲毒煙霧瘴癘水磨服吐利即安癰疽發背對口疔瘡天蛇無名腫毒蛀節紅絲等疔及楊梅痔瘡無灰酒磨服外以水磨塗瘡上陰陽二毒傷寒瘟疫發狂喉風薄荷湯冷磨服赤白痢吐瀉霍亂絞腸及諸痰喘薑湯磨服男婦急中顛邪鬼交鬼胎失心狂亂羊兒豬癲等風石菖蒲湯磨服縊溺驚壓鬼魅但心頭微溫者生薑續斷酒磨服蛇蠍瘋犬咬傷酒磨灌下再服蔥湯被蓋取汗新久瘧疾臨發時東流水煎桃柳枝湯磨服急慢驚風五疳五痢脾病黃腫癮疹瘡瘤薄荷浸水磨濃汁加蜜服仍搽腫處年小者分數次服牙痛酒磨塗腫處仍含少許良久咽下小兒因父母遺毒皮踏爛斑穀道眶爛清水磨塗打撲損傷無灰酒研服久年頭脹頭痛偏正頭風蔥酒研服仍磨塗太陽穴婦人經閉紅花湯下天行疫氣桃根湯磨濃汁搭入鼻孔次服少許得不傳染傳尸癆瘵為蟲所噬磨服一錢或吐或下惡物小蟲其病頓失衛生寶丹修合法治法同前玉樞丹而此藥又勝之山慈菰川文蛤紅芽大戟千金子各二兩麝香西牛黃珍珠明雄黃滴乳香去油沒藥去油硃砂琥珀蜜珀不用丁香沉香各三錢金箔十帖為細末糯米粉煮糊木臼搗印錠每重一錢菩提丸前胡薄荷蒼朮厚朴枳殼香附黃芩砂仁木香檳榔神麯麥芽山楂陳皮甘草白芍藿香紫蘇羌活半夏各等分用薄荷葉煎湯拌各藥勻曬乾為末蜜丸彈子大每一丸小兒量減瘟疫時病感寒薑湯下暑症香薷湯下瘧疾薑湯下傷風咳嗽百部三錢煎湯入薑汁下赤白痢車前子湯下水瀉薑茶湯下霍亂吐瀉胡椒四十九粒緑豆四十九粒煎湯下心腹痛薑湯下一粒金丹雄精乳香去油沒藥去油砂仁羌活各一錢半夏薑汁炒烏藥各二錢巴豆去心衣炒黑一兩五錢山豆根五錢蒼朮米泔浸四錢杏仁四十九粒去皮尖麝香三分共為細末蜜泛為丸梧桐子大辰砂為衣每服一丸病在上部研碎服中風痰厥暴死但心頭有微熱服之立蘇用清湯下心氣疼痛艾醋湯下痢疾甘草湯下氣不順木香湯下身熱白湯下肚脹香附湯下口眼歪斜麻黃湯下諸般腫毒老酒下蛇傷雄黃湯下身腫荊芥湯下瘋犬咬斑蝥七個炒防風湯下瘧疾井水下小兒驚風薄荷湯下頭痛川芎湯下酒肉食積鹽湯下喉症薄荷湯下痄腮紅腫赤芍湯下孕婦忌服又忌豬羊鵝牛雞糟面生冷油煎服後勿飲冷茶水飲則無效太玄丹白犀角山慈菰玄明粉麻黃去節血竭甘草黃連各末一錢雄黃三分治傷寒外感瘟疫癰毒哮喘冷氣攻心乳吹兼治痘疹初起誠神方也上為極細末薑汁拌濕烏金紙包外用紅棗肉搗如泥包半指厚作二團入砂罐內又用鹽泥固之上下加火候煙將盡離火少頃取出去棗肉每藥一錢加冰片二分半麝一分研極細末磁瓶收貯黃蠟塞口每用以簪腳蘸麻油點藥入眼重者吹鼻俱男先左女先右立刻汗出愈忌生冷麵食煎炒腥濁之物兼能和七情若病人神脫者勿點此藥能去病不能活命也混元丹混元衣即人胞二錢牛黃三分麝香三分黃耆二錢遠志甘草汁泡二錢金箔三帖為衣天竺黃三錢白茯苓二錢五分白茯神二錢五分甘松去毛四錢砂仁去殼三錢梅花瓣一兩益智仁去殼六錢山藥薑汁炒二錢五分滑石丹皮二兩水同煮乾去皮六兩粉甘草去皮一兩莪朮麵包煨三錢人參去蘆一錢木香二錢香附酒浸一日鹽水炒一兩桔梗去蘆二錢辰砂甘草一兩水泡同煮乾去草一兩為衣此丹治男婦諸虛百損五勞七傷小兒百病二十二味藥為細末蜜丸如龍眼大量人大小加減照引下中風痰厥不省人事薑湯研下傷寒夾驚發熱無汗蔥姜研下取汗停食嘔吐大便酸臭腹脹薑湯下霍亂轉筋紫蘇木瓜湯下赤白痢疾裡急後重陳倉米湯下大便出血槐花湯下小便不通車前子湯下盜汗自汗浮小麥湯下發熱薄荷湯下痘疹不發升麻湯下中暑煩熱發渴燈心湯下喘急咳嗽麻黃杏仁湯下肚腹積聚陳皮薑湯下蟲痛苦楝樹根皮湯下小兒夜啼燈心湯下夜啼盤腸內吊鉤藤湯下疝氣偏墜大小茴香湯下急驚搐搦薄荷湯下慢驚人參白朮湯下諸病無精神少氣力減飲食臥不穩薑棗湯下胎寒手腳冷口氣涼腹痛腸鳴刺痛薑蔥湯下兩目浮腫四肢俱腫面黃茯苓桑白皮大腹皮陳皮姜皮名曰五皮湯下瘧疾槐柳枝各五寸姜三片蔥煎湯露一宿發日五更溫熱研下赤白濁淡竹葉燈心湯下疳積發熱肚大身瘦手腳細枯大便或瀉或閉小便如泔如淋陳倉米湯下小兒初生糞不出口吐白沫臍風撮口腹脹蔥薑湯下此藥大人每服三丸小人每服半丸至一丸三歲至十歲每服二丸量大小加減常服進飲食寬中寧心消驚養神百病俱效先天一氣丹水中金一錢滑石研細丹皮湯煮過六兩粉甘草二錢益智仁六錢人參一兩木香不見火二錢砂仁三錢香附童便制一兩甘松四錢莪朮煨三錢桔梗二錢黃耆蜜炙二錢山藥二錢茯神二錢五分茯苓二錢五分遠志肉淨一錢五分牛黃五分天竺黃三錢麝香三分硃砂飛二兩為細末蜜丸重一錢金箔七十張為衣治遠年痰火中風喘逆顛癇譫語驚悸怔忡胃脘痛噎膈臌脹氣滿癃癧諸無名怪症俱淡薑湯下小兒吐瀉驚疳積滯米湯調下急慢驚風肚腹痛薑湯下危急痘症燈心湯下無價寶珠丹琥珀四錢牛黃三錢珍珠二錢犀角一錢羚羊角一錢水中金二錢琥四牛三珠二靈犀一點無差先天神水二分加天月德合丸他文蛤煎湯為糊金箔為衣豆大依方修合用心查百病自絶根芽不怕風勞蠱膈諸虛百損交加一丸服下妙無涯返本還元功大吐血骨蒸立止還魂救死堪誇任他國手廣如麻可比金丹無價二氣靈砂丹胃虛嘔吐傷暑霍亂肺熱生痰心虛有火神魂不寧俱不可用水銀一斤硫黃四兩入鍋炒斷星入陽城罐升打五香開出成朿針紋赤色為佳桑灰醋淋汁煮制米糊丸芥子大每服三分或一分治諸虛痼冷厥逆及上盛下虛痰涎壅盛此丹能升降陰陽和五臟助元氣下逆氣殺精魅鬼邪扶危救急之神方也孕婦忌服常服每用人參湯空心送下或棗湯下疝氣木腎偏墜腫痛茴香湯下白濁遺精白茯苓湯下虛勞咳嗽生薑烏梅蘇梗湯下腰腹滿痛莪朮湯下盜汗溺多牡蠣煅少許煎湯下瘧疾不已桃柳枝湯下吐逆翻胃丁香藿香湯下中風痰厥面青木香湯下走注風痛遍身作痛蔥白湯下腳膝痛木瓜湯下氣滯生薑陳皮湯下婦人血氣作痛延胡索五靈脂酒醋各半下小兒慢驚沉困胃虛嘔吐神脫人參丁香湯下寸金丹川芎防風羌活白芷蘇葉陳皮赤茯苓厚朴蒼朮米泔浸半夏薑製白豆蔻去皮各二兩藿香砂仁去殼香附木香忌火前胡薄荷臺烏藥以上各三兩枳殼炙甘各一兩五錢草果仁一兩神麯炒五兩以上藥共研細末又用生神麯二十五兩為末薑汁打糊為丸每丸重二錢硃砂漂過四兩為衣治男婦老幼中風中氣中寒中暑口眼歪斜牙關緊急不省人事霍亂吐瀉轉筋內傷飲食生冷胃口停痰胸膈脹滿不思飲食或出遠方不服土水作瀉心痛腹痛噁心水瀉瘧疾四時感冒傷寒頭痛發熱遍身疼痛惡寒無汗服此發汗傷風咳嗽山嵐瘴氣噯氣吞酸紅白痢疾婦人産後昏迷惡露不盡小兒急慢驚風一切諸症俱用淡薑湯研下大人每服一丸重者二三丸小兒半丸孕婦忌服蒸臍法用桑木做一小甑上口如酒杯大下眼如筆管大甑高三四分以便藏藥另用銀打一小鍋如甑上口之大底鑽細孔先以麝香二三釐摻入臍中以蕎麥麵和作一圈將甑坐上勿走氣以藥末填入甑內對臍蓋以銀鍋用指頭大艾炷燒之俟腹內微痛身上微汗鼻有香氣即止不拘壯數人參紅鉛金剛子即臍帶中血胎髮餘煅存性鹿茸酥炙大附子制白附子沉香母丁香乳香炙大茴香硃砂雄黃石鐘乳煅白色中空者佳鵓鴿屎煅龍骨煅青鹽煅桂心椒紅夜明砂淘去泥沙虎骨炙穿山甲整用生漆塗封掛起照病之上下左右背腹手足取用其爪尖無所不達尤攻痔漏無此則不效龜板炙秋石各等分上為細末治下元虛冷遺精白濁腰膝痠痛血崩淋帶經行不調産後久不生育痿痹脾泄痢疾食積中滿氣滯血蠱臌脹翻胃濕痰心疼有蟲者不宜瘋疾大麻瘋加硫黃蛇骨筋骨疼痛穿山甲可照疼痛處取甲用凡屬虛寒之症須用桂附者無不立效若骨蒸內熱多火大腸燥結及肚痛有蟲之症皆非所宜㠟峒丸山羊血四錢鬱金一錢真西牛黃不見火一錢螣黃用清水重湯頓化濾淨渣再於磁器內重湯煮三炷香如干可少加水俟香盡取出用絹布蓋好埋土七日取出又煮埋七次曬乾四錢雄黃不見火一錢兒茶天竺黃各四錢生大黃錦紋者六錢血竭微烘四錢阿魏一錢燒酒浸重湯煮過曬乾同雄黃先研冰片五分麝香去毛皮淨五分二味俱勿見火三七微烘四錢乳香沒藥各四錢此二味用滾水浸化揀去滓穢放銅杓內微火緩緩煮乾置地上候燥用刀刮下上藥研細末煉蜜為丸每重五分此丸功力甚捷一丸必救一人百發百中一效不可再服內服俱用無灰酒磨送下外敷俱用細茶汁磨敷須留出瘡口止敷腫痛處凡磨藥忌生冷水用藥並忌一切毒物癰疽發背及無名腫毒每用一丸半服半敷肺癰腸癰內潰研服一丸病重二丸驚恐吐血成癆磨服血積癥瘕血瘀蟲脹磨服跌打折傷筋斷骨折並刀箭傷刑杖重傷俱內服外敷馬刀瘰癧遠年不愈磨敷不服産後惡血攻心昏迷不醒並橫生逆産胎衣不下磨服婦人乳吹磨服小兒急慢驚風初生月內者每丸分四次服一周者三次服二三歲二次服五六歲者一次服蛇傷蜂蠍蜈蚣一切毒螫所傷及顛犬咬毒氣入內俱內服外敷凡服藥三日內忌冷水生物一切寒物犯之害不可當慎之利生丸茅蒼朮烏藥二味俱米泔浸一宿曬乾香附一半童便浸炒一半米醋浸炒藿香純蘇葉厚朴薑汁炒陳皮青皮醋炒赤芍酒炒砂仁去殼小茴微炒木香草果麵裹煨去殼各二兩川芎微炒歸身微炒黃芩微炒枳殼麩炒白茯苓木通雞心檳榔各一兩粉甘草五錢上藥不可烘須日曬乾為末陳早米糊為丸每重一錢五分亦須曬乾不可見火約干藥每丸九分每服一丸心痛燈心二分姜一片煎湯送下肚痛姜一片搗碎入炒鹽三分開水沖服胸腹膨脹姜皮五分大腹皮一錢煎湯下瘧疾發日用東向桃腦七個姜一片煎湯下風痰喘嗽蘇葉薄荷湯下赤痢白蜜二錢米湯調下白痢紅糖二錢薑汁一匙同米湯調下疝氣小茴川楝湯下隔食嘔酸小兒痞積薑湯下血崩惡露不淨當歸一錢煎湯下身面黃胖濕痰流注無名腫毒俱陳酒下烏金丸木鱉子不拘多少以麻油煮浮為度以小麥麩炒去油氣用磁鋒刮去毛皮研為末麵糊丸緑豆大每服三分小兒一分未服藥之先去大小便服藥後蓋被出汗不可見風犯之寒戰須嚼生薑解之傷寒蔥湯下霍亂藿香湯下痰火薑湯下瘧疾桃枝湯下火眼菊花湯下瘟疫涼水下流注花粉湯下白濁胡椒湯下紅痢細茶下白痢薑湯下吐血京墨磨井水下結胸薑湯下心痛香附湯下腫毒雄黃湯下便毒蔥汁下水瀉神麴茶汁下頭風川芎湯下嘔吐薑湯下血崩紅花湯下重舌吹藥五釐涼水咽下脅脹陳皮湯下食蠱山楂麥芽湯下食膈陳曲麥芽夜壺水煎湯下鎖喉風以火酒漱口用藥摻之疝