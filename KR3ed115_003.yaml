皂角刺栝蔞仁各九分氣壯者加朴硝一二錢水酒各一碗煎七分服痛定自愈疔瘡初起方飲麻油一鍾可保無虞又血疔服麻油一杯能止血化毒消疔方大荔枝一個同雞溏屎研和塗之痛止熱退疔瘡方鰣魚鱗生取下磁瓶收貯用時以濕貼患處覺冷愈又方大鯽魚頭切下生煅煙盡存性番木鱉麻油煎至浮麩拌炒去油為末各等分研細末摻瘡口上外貼膏藥未成膿者即消已成膿者即潰二三次愈瘡癤皆可用疔瘡危篤方土蜂房全個蛇蛻一條上同納瓦罐中黃泥封固煅存性為末每服一錢酒調下少頃腹中大痛痛止其瘡已化為黃水矣至重者不過二服愈碧霞丹不疼者甚效銅緑一兩蟾酥二錢巴豆霜一錢麝五分共為細末用蝸牛搗為丸米粒大刺瘡出血入藥粒膏蓋之神效散硼硇砂皂礬明透者鹽各五分搗粗末入鐵杓加水炒乾再炒至緑色為度又研細末用時以針將瘡刺破見血以銀簪蘸藥點入瘡口麵糊為膏攤紙上貼一二層二三寸香時黑者即變紅數日痂落如無生血或血黑色急以親人血滴入點藥十中可活三四否則不治反唇疔方荔枝燒灰存性麻油調塗兼治諸毒奇妙如生耳疔或鼻疔塗外面即愈又方鹽酸草酒煎服汁渣罨立愈馬嘴疔方生唇中下不急治即死用生雞冠血頻頻塗之又蜘蛛一個研爛塗之紅絲疔治法起於手足上長至一尺余難治先用紅絨扎住將小刀挑斷紅絲要出血少許用蘿蔔連菜搗碎敷患處熱則換之敷至腫消即愈或用芙蓉葉花根搗敷亦可牛水諸疔方以黃豆嚼不知腥即疔矣急取家菊花不拘多少無花用葉或根搗汁酒沖儘量飲之將渣加鹽少許敷上並一應腫痛處俱敷之立愈如已死者將汁灌入口即活山海丹治疔瘡惡瘡海馬一對酒炙黃山甲三錢土炒水銀一錢雄黃三錢兒茶三錢黃柏五錢麝香一錢共為末同水銀研至不見星為度磁器貯用時以井水調塗瘡處即毒出神效豆腐疔方色白而痛不可忍或生手指羅紋之上又名發羅疔蜒蚰三個水粉二錢白梅乾三個去核上同搗敷患處止痛立消瘰癧癭瘤門癧𤶱方蜒蝣無殼者用鹽水浸一宿陰於瓦焙為末沙糖為丸桐子大每服三錢蜜酒漿調勻下任久遠不能收功者無不見效瘰癧初起用全蠍炒為末每服二三分滾水調下漸次自消甚效遇仙丹治瘰癧破者即合未成者即消白朮土炒一兩三錢檳榔五錢防風一兩密陀僧七錢郁杏仁泡取肉八錢黑牽牛半生半炒頭尾一兩斑蝥去頭足糯米炒黃色四十九個生甘一兩貝母二兩為末麵糊丸梧子大每服草丸用甘草檳榔湯食後送下至一個月毒從小便出如覺腹痛用黑豆或黃連或蔥茶湯俱能止痛取癧核法水銀月石硝皂礬白礬鹽各一兩硃砂二錢入罐內封固升打三炷香冷定取起為末飯丸緑豆大硃砂為衣先將核挑破皮用一丸放核上綿紙封固一日足急掣起則核隨紙帶出海藻丸治蛇盤瘰癧如頭項盤旋至交接者危海藻水洗淨用蕎麥麵拌炒去面白殭蠶取內如栗青者用水洗酒拌炒去絲各等分為末霜白梅泡取肉搗丸梧子大每服六十丸薏米湯送下其毒從大便出忌厚味豆腐癭瘤方或水或血或粉或肉紅信一錢明礬一錢雄黃三分象牙沒藥各五分狗寶三分為細末用紙捻麻油浸濕藥末敷紙捻上圈瘤根外用清涼膏貼之四日一換或六七次或十餘次不痛不爛其瘤自下下後用收口膏藥治之永無後患系瘤方兼治去鼠奶痔凡根下小的俱可系芫花根洗淨帶濕於木石器中搗取汁用線一條浸半日或一宿陰乾以線系瘤之根徐徐收之經宿即落未落再換線不過二三次自落落後用龍骨煅訶子等分為末敷瘡口即合或用芫花泡濃汁浸線亦可血瘤驗方治下唇血瘤一人下唇中生一小血瘤用手掐破流血不止此係任脈之盡故也後以三七人參末敷之再用吳茱萸末白麵為糊攪勻攤如膏萆麻子研敷兩腳底心以前膏蓋之遂血止其瘤較前十倍幸其根小遂用系瘤方治之而愈痰𤶱不收口方兼治一切痰毒不收口用淡豆豉一手把嚼爛做成餅蓋瘡上大壯艾火灸之至微痛而止過一日又如前灸如此四五次則痰散以收口膏貼之自愈虛𤶱驗方治肝腎虛損生𤶱連進數十劑未成者消已成者出毒愈熟地八錢萸肉二錢山藥二錢茯苓一錢五分丹皮一錢五分澤瀉一錢夏枯草三錢川貝二錢白芍三錢柴胡五分水煎飽服或加黃酒一小杯更妙乳病門內外乳吹未潰方穿山甲酒炙黃脆一錢五分蟬蛻麻油炒透新瓦上炙燥四分半為末分作四服酒下三服必愈尉法治乳吹乳癰登時立消此方奇而穩甚效蔥連根搗爛鋪乳患處上用瓦罐盛炭火蓋蔥上一時蒸熱出汗即愈一醉散治乳癰石膏煅為末每服三錢溫酒下能飲者添酒盡醉睡醒再進一服立消乳結硬痛大鯽魚頭煅灰酒服一二錢汗出即瘥乳吹方以鵝毛煅存性為末酒送三錢地丁膏治乳吹並一切毒俱效黃花地丁即蒲公英紫花地丁各八兩以長流水洗淨用水熬汁去渣又熬成膏攤貼內外乳吹用不經鹽蟹殼瓦上焙乾為末酒下二三錢立愈乳癰紅腫蒲公英一兩忍冬藤二兩搗爛水二鍾煎一鍾食前服睡覺病去其渣敷患處乳吹乳岩方栝蔞一個去皮子多者有力生甘當歸酒炒各五錢乳香沒藥去油各二錢半共為末用無灰酒三升砂鍋文火煎一升分三次食後良久服如有乳岩服此可斷根如毒氣已成能化膿為黃水如未成即於大小便中通利如痰甚者再合服以退為度乳癖乳岩方蒲公英金銀花夏枯草各五錢土貝母三錢白酒二碗煎一碗空心熱服愈一方加當歸一兩花粉三錢生甘二錢山甲一片炙同上煎服又方治乳岩乳癰葫蘆巴三錢搗碎酒煎服渣敷之未成散已成潰愈疳瘡門楊梅瘡方用癩蝦蟆大者為佳眼紅者有毒不可用取時不可努力恐走蟾酥宜用圓口小瓶一個置於地上緩緩趕其自進量飲酒半斤者下酒一斤須煎去半斤乃可服其瓶口用木蓋塞緊仍以紙條封固不可出氣慢火煎煨先將瓦瓶與酒稱過斤兩若干煎折半斤可除火去蝦蟆只取清酒溫服服後用綿被蓋暖取汗汗乾方可起動更勿坐當風處恐入風氣若上部瘡多略食些粥服若下部瘡多空心服如一服未效三四日再服一個決全愈矣且不復發屢用屢驗楊梅陰毒方得之房事者毒氣傷肝腎為陰毒症重生地當歸銀花甘草節各一兩另用土茯苓二斤捶碎入無灰酒十斤浸一宿再入豬胰子二個去筋膜淨砂鍋煮至四大碗去渣入前藥同煮至二碗服之忌食鹽忌鐵至重者二服全愈楊梅陽毒方因外感者毒氣傷脾胃為陽毒宜發汗症少輕胡桃肉一兩紅棗一兩透骨子即鳳仙子五錢松蘿茶一錢黑沙糖三錢酒二碗煎一碗露一夜熱服以綿被矇頭取汗以腳心有汗為度重者二服其被本人自取埋土中面紅面黑下疳並治楊梅瘡煎方七劑除根防風皂角刺天冬黃芩栝蔞金銀花當歸熟地木瓜木通米仁紫花地丁白蘚皮各一錢土茯苓四兩甘草五分水三碗煎二碗作二次服四劑後去木瓜木通蘚皮土茯苓減二兩五錢加桔梗七分再服三劑如毒未盡後服解毒湯解毒湯土茯苓一兩米仁防風木瓜木通白蘚皮各七分金銀花一兩皂角刺四分如氣虛加人參五分血虛加熟地三錢歸身一錢水煎服洗藥方生甘五錢金銀花四錢苦參防風荊芥車前黃柏各二錢六分川椒一錢煎湯洗末藥方治結毒筋骨疼痛口鼻腐爛冰片硃砂飛面琥珀珍珠滴乳香牛黃以上各一分半共研細末作十二次服每日空心用白滾湯送下一服如有腐爛處即用此藥敷之極效惟忌發物以上四方治過十餘人神效異常八寶丹治楊梅瘡此瘡不可用輕粉風毒必用箭頭砂滴乳香各五分冰片一分珍珠二分琥珀一分牛黃二分麝香七釐為細末每服一分和飛面五分用岐良十兩煎湯送下每岐良十兩木槌打碎水十碗煎五碗用汁一鍾將藥六分送下其餘岐良汁一日服盡至四十九日永無後患如治風毒加輕粉五分如破爛加乳香四分狗胎骨二分楊梅風毒方一方生蘿蔔切片貼之久則自愈用魚鰾切小塊炒黃成珠研末每用五錢以豆腐皮包末分作數包無灰酒送下瘡在上晚服在下早服三五日即消松香散治疳瘡破爛用此藥摻之三日收口但須內服解毒散冰片三分為細末研勻或摻或用麻油調搽如癢加白礬末少許文蛤散治下疳神效五倍子一個鑽孔入乳香一錢五分煅為末入冰片五釐摻之鼻疳方爛通鼻孔者俱治鹿角一兩明礬一兩俱放在瓦上隔火煅過人發五錢在燈火上燒過共為末溫花椒湯洗淨摻藥於疳上三四次即愈如瘡不收口用瓦松燒灰存性研末乾摻之即收鉛汞丹治楊梅瘡後舌斷及陰陽爛去者塗之即完如舊鉛一兩用黑狗頭一個將鉛入腦內鹽泥重包炭火燒紅取出每制鉛一錢粉霜二分月石一分半為極細末貯磁器聽用如舌斷先將米泔水入帶須蔥頭煎湯待溫令漱淨以綿胭脂拭乾敷藥口內一時即長長至原舊光景即以水洗去藥恐過長也陽腐去者以蔥湯薰洗敷之亦如上法宮粉膏治陰陽爛去半邊者水粉一錢兒茶五分冰片五釐豬骨髓少許研膏烏金紙攤貼如婦人填入戶內或曬乾研末鵝毛管吹入即愈闞家丸治楊梅結毒誤服輕粉毒發久爛不痊七日見效槐蕊三錢微炒輕粉一錢二分當歸鬚一錢五分白芷一錢牛黃五分丁香乳香頂紅硃砂沒藥各一錢珠子五分雄黃一錢陳蜜丸緑豆大每服七丸日四服土茯苓湯下歸靈湯治疳瘡不論新久但元氣虛弱者宜服此方當歸川芎白朮白芍熟地米仁木瓜防己花粉金銀花甘草白蘚皮人參各一錢威靈仙六分土茯苓二兩水煎服下部者加牛膝五分服至骨不痛瘡色淡紅為度加味遺糧散治疳瘡初起筋骨疼痛及瘡久不愈或誤服輕粉致髮結毒等症此症初起多生下疳服此不致成瘡當歸川芎防風米仁木瓜金銀花木通白蘚皮蒼朮威靈仙各一錢生甘五分皂莢子五個切微炒土茯苓二兩水煎服病久者加人參一錢下部瘡多加牛膝五分病淺者服一月愈病深者百日亦愈忌魚腥煎炒火酒牛肉及一切發物解毒岐良湯不問新久骨痛潰爛並治壯健者用土茯苓二兩防己防風花粉角刺蘚皮連翹川芎木瓜當歸風藤金銀花蟬蛻米仁各一錢生甘五分水煎服加酒一小杯下部加牛膝五分升麻解毒湯治疳瘡骨痛並流注結毒破爛不收及咽喉損破但壯健者並宜服之升麻四錢角刺新鮮者四錢土茯苓一斤項以上加白芷咽內加桔梗胸腹加白芍肩背加羌活下部加牛膝各一錢水八碗煎四碗一日服完每次頓熱加真麻油三茶匙十帖全愈珍珠散治下疳破爛痛不可忍及諸瘡新肉已生不能生皮並湯火瘡破爛痛甚者俱效靛花五分缸內取者佳珍珠一錢豆腐煮研碎輕粉一兩飛面五分共為細末先用生甘煎湯洗淨瘡口再用豬骨髓調前藥末敷之鵝黃散治疳瘡破爛痛甚者石膏煅輕粉黃柏各等分為細末摻瘡上即生疤再爛再摻毒盡乃愈此止痛收干之聖藥也岐良散治結毒初起骨痛及已破潰爛者岐良四兩荊芥防風川芎當歸花粉金銀花白蒺藜米仁威靈仙梔子黃芩連翹川連葛根白芷生甘各六分下部加牛膝五分水煎服服後飲酒一鍾忌牛肉火酒發物並房事芎歸二術湯治結毒已成未成骨痛步艱及潰後肌肉不生症蒼朮白朮川芎當歸人參茯苓米仁角刺厚朴防風木瓜木通山甲炒獨活生甘各一錢金銀花二錢精豬肉二兩土茯苓二兩水煎服數十劑愈紫金錠治結毒腐爛不堪石決明九孔者煅紅童便漬之辰砂各二錢龜板炙焦酒娘塗之黃脆為度淨末二兩上為細末飯丸麻子大每服一錢骨痛酒下腐爛土茯苓湯下重者不過四十日愈比五寶散更好碧玉膏治結毒潰爛不收口輕粉杭粉各一兩乳香沒藥各去油三錢冰片二錢上為細末熟公豬油五兩入白占米五錢熬化入碗內以前藥末和勻水內頓一時用時以抿腳挑膏在手心捺化攤油紙上用蔥湯洗淨瘡口貼之火丹蛇纏門丹腫奇方凡五色丹毒俗名赤遊風不早治多死不可輕視榆白皮為末雞子清和敷一方螺螄搗汁塗效一方大黃朴硝等分為末水調敷白火丹用香麻油擦眉上即乾者是又指甲白者是北細辛為末大人每服二三錢小兒一錢或五分井水調下其粗末再研紗袋盛撲患處隨手愈又方人中白末三錢搗生大黃汁送下令大瀉或大黃煎汁送亦可又白火丹方用水田螺一個冰片半分合臍上不過二三個愈神方也蛇頭方豬膽一個入雄黃五分冰片蟾酥各半分攪勻套指上線扎定即時停痛藥干瘡即愈或用田雞皮包之亦愈如冬月無田雞在桑樹下尋之蛇頭蛇腹蛇眼蝸牛五個荔枝肉五個鹽梅五個共搗爛敷患處即消赤白蛇纏方大黃五倍子各二錢為末蛇殼燒灰菜油調敷立效纏身龍將糞杓竹包尤燒灰香油調敷立好瘡癬門臁瘡方兼治裙帶瘡爛臭起沿生腐渣一味捏成餅如瘡大小先以清茶或蔥湯洗淨絹帛拭乾後以腐渣餅貼上再以帛縛之一日一換其瘡漸小其肉漸平神效無比冰爐膏爐甘石火煅二兩為末冰片二分上藥以豬鬃油搗成膏先以茶汁加鹽少許洗淨瘡口敷藥以膏蓋之不獨臁瘡凡久遠不收口者並效又臁瘡方陳年地上白螺螄殼洗淨煅灰存性研末麻油調成膏先將溫水洗瘡口輕粉少許摻之將油藥攤成膏再摻輕粉少許貼之不可動換數次即好臁瘡收口方先拭淨瘡口取十八九歲婦人頭髮洗淨燒灰研細末填滿瘡上外以油胭脂作膏攤貼神效惡瘡百藥不瘥方馬齒莧搗爛敷之三兩次愈救苦丹治赤爛瘡神效黃柏為末生桐油調敷患處三四日立效肥瘡方兼治耳邊生瘡松香水粉等分共為末用麻油調勻敷碗底將碗覆於盤上微露縫置艾火於盤內徐徐熏之取起調勻又如將前熏之如此數次以藥色變至淡黃為度搽瘡口上敷數次愈凍瘡方記所凍處次年櫻桃熟時以桃擦之當年不發又方鮮山藥黑砂糖各等分搗和塗之漆瘡方旱蓮草和酒服又煎水日洗數次即愈漆瘡發脹方鼓槌頭草二三十株地骨皮二兩鹽礬各三錢酒水各一升煎洗數次冷再溫洗內服涼血敗毒藥烏金散治外腎生瘡松樹炭紫蘇葉等分為末香油調搽蛀杆方鵝口繭煅灰五分枯礬五分倍子一大個炒兒茶一錢輕粉一錢紅絹方圓二寸燒存性為末先將酸泔蔥椒煎湯溫洗拭乾摻藥神效護龍散治腎漏陰囊先腫後穿破出黃水瘡如魚口能致害命文蛤以石灰炒黃色去灰出火毒研極細末摻五七次愈坐板瘡方蠟過舊皮鞋底燒灰搽之妙又絲瓜皮焙乾為末燒酒調搽愈灸瘡久不瘥方牛屎燒灰存性為末敷之即好風入瘡口方腫痛難忍劉寄奴末摻之即安瘡不收口成漏方上身者名蟻漏穿山甲炒研末摻之下身者為蟺漏石灰泡湯洗之治漏方黃豆七粒生男胎髮七團陰陽瓦煅存性為細末入冰片少許將瘡洗淨填藥入內次日如藥被毒水衝去再填數次候毒乾肉長然後以收口藥敷之螟蛉窠去外層粗泥研極細末入冰片少許敷之其口即收治癬方土槿皮五錢白芨二錢五分白芷二錢五分蓽茇二錢五分白蘚皮五錢明雄黃一錢五分斑蝥八分百部二錢五分上藥為末用好燒酒一斤浸藥透刮破癬用土槿皮一塊蘸藥擦之每日兩三次治癬效方蘆薈三錢硫黃一錢枯礬四錢白信一錢輕粉六錢共為末先用土大黃根擦之癢處用陳米醋蘸藥擦之神效治癬神方不拘遠近頑癬俱效文蛤一兩炒硫黃一兩一錢為細末米醋調如糊先以穿山甲略刮去頑皮敷藥如膏一層外以皮紙貼之遇晚揭去三次全愈風癬方艾葉不拘多少醋煎如膏先以穿山甲片刮破癬後擦之頑癬方糠皮燒油搽之三日愈兼治癩頭瘡搽之神效又溫湯洗軟韭菜擦數次愈又頑癬方先用米泔水洗淨穿山甲刮破再以白糖研爛甘草汁調敷頑癬神方雌黃青黛輕粉等分為末濕癬乾摻乾者用指甲抓破敷藥上貼清涼膏內出黃水七八日後水乾自愈多年頑癬方將雄雞腰子一副摘開搽之數日即愈牛皮癬方香油一兩全蠍七個巴豆二十粒斑蝥十個同熬至焦黑色濾去渣入黃占一錢候溶收起朝擦暮好疥癩門洗疥方金神花五錢荊芥二錢防風二錢甘草一錢白礬五分馬鞭草五錢川椒三錢苦參五錢歸尾二錢上藥煎湯熏洗三四次愈疥瘡百效方石膏生一兩硫黃一錢枯礬五分共為末豬油調擦之蛤石輕黃散蛤粉一兩生石膏一兩輕粉五錢黃柏五錢共為末濕疥摻之乾疥用熟豬油磨檳榔至淡紅色調敷如癢少加枯礬合掌丸大楓子四十九粒去殼樟冰花椒檳榔各三錢枯礬二錢雄黃二錢水銀一錢先將楓子水銀同研至不見星再研油核桃數枚令爛入前藥搗丸如龍眼大日則手搓鼻聞並擦患處夜則合於掌中而睡不過數日必愈禿瘡方蛇床子煎湯洗三五次腥淨為度後用黃柏一兩枯礬三錢為末麻油調塗癩瘡方豬腳合黑者為佳不拘多少每一個內入生梔子一個白礬少許火煅存性研末芝麻油調搽四五次即愈鬎鬁頭瘡方紅棗煮熟去皮核加輕粉樟冰搗爛厚敷頭上戴氈帽三日後去帽瘡自愈又鬎鬁方獨核肥皂去核填入沙糖一匙巴豆二粒扎定鹽泥包煅存性為末加檳榔輕粉各七分研勻香油和擦頭上先用灰汁洗頭溫水再洗拭乾搽藥一宿換藥次日又換數日即愈不必再洗痔漏門痔漏神方忌姜椒辛熱煎炒炙爆酒醴及一切發風之物愈後忌房勞一百二十日永不復發矣蕪荑仁雷丸當歸龜板酒炙鱉甲各一錢炙蟬蛻蠶蛻各八分枳殼大黃各五分烏梅一個角刺二十個銼同黃蠟一錢炒蠟盡竹葉七片上藥用黃酒碗半煎七分空心溫服以干豬肉壓之服至八日後漏管蟲根俱出減去角刺蟬蛻另用雞肫皮包龍骨五分赤石脂五分入豬蹄甲殼內炭火煅過去甲殼皮不用將龍骨石脂入藥內照前煎服五七次除根痔漏落管方倍子十兩水煎至如糊入黃占十八兩為丸每日空心清湯下三錢忌鵝豬羊魚發物痔漏驗方象皮一斤槐米一斤炒淡黃色上藥為末蜜丸梧子大早服三錢晚服二錢淡鹽湯送下枯痔方金色密陀僧五兩生礬一兩枯礬一兩另用黃占三兩麻油三兩化開入前藥末攪勻衆手為丸如桐子大雄黃五錢青黛二錢為衣先用白湯下八分再加二分漸加至二錢其痔結成一塊從大便而下血痔方用茅草燒灰白酒調下外用鵝膽調冰片塗之即消又方治血痔兼下血能明目槐子於冬月入牛膽內陰乾百日每日吞一枚內痔腫痛方先用屋蔥一把野木連五六個經霜者煎湯熏洗再用鱉頭煅存性加冰片少許為末以木鱉子去毛磨麻油調塗立效或以熊膽磨麻油加冰片塗之亦效此法兼治外痔痔漏奇方貫衆一斤去毛切片燒酒二斤煮乾又加燒酒一斤鉛粉一兩同炒川萆薢一斤用醋二斤煮炒槐角八兩酒炒條芩八兩酒炒初起如珠者或下血止用此四味醋糊為丸服之自消如臟穿成漏者加蟬蛻八兩水酒拌炒槐角子八兩酒炒蒼耳子搗去刺八兩酒拌炒乳香一兩去油雄黃五錢兒茶一兩血竭一兩歸尾二兩地榆一兩枳殼二兩麩炒上藥共為末醋打麵糊為丸如梧子大每服三錢每日三服白滾湯下空心服痔漏腸紅方棉花子炒黃黑去殼為末陳米糊入砂糖為丸如桐子大每日空心清湯下三錢服三斤斷根消痔散即拖出二三寸者皆可治凡敷藥先以溫湯洗淨患處乳香二兩明亮者佳沒藥二兩和尚頭者佳大黃三錢黃丹五分硃砂五分雄黃五分五倍子三錢去蟲用銅鍋炒至栗殼色為度各藥研極細末以菜子油調勻鴨毛蘸藥輕敷患處切忌指甲立刻止痛收上再加龍骨血竭少許攙入前油藥內敷糞門糞門爛者用此不爛者不必用待至好七八分時用海螵蛸三分沁上生肌永不再發各藥俱忌鐵器痔漏方五靈脂二斤炒無煙為末米糊為丸每服三錢海粉湯下又血痔方蕎麥麵不拘多少用豬膽為丸白滾水送下二三錢即止痔漏神效方刺蝟皮一個鮮者更佳蟬蛻二兩豬大腸八寸入皮硝二兩防己二兩豬後懸蹄爪尖二十四個黃牛角心尖一對以上共煅存性乳香炙沒藥各五錢炙血竭三錢麝香二分蜂房一個瓦焙乾露天者佳穿山甲五錢炒象牙三錢生地一兩金銀花一兩為末蜜丸陳酒空心下三十丸忌酒色煎炒魚鮮油膩發物如金散擦痔七日自落雄雞二隻放在靜處餓二日次早用豬胰子切碎拌米粉二合喂之接糞一兩曬乾入雄黃六錢膽礬五錢明礬皮硝各一兩為細末入傾銀罐內用瓦蓋之大火煅起青煙取起加乳香沒藥各二錢冰片五分研勻磁罐收貯封口每用津唾敷痔上良久去之再敷六七次至痔變黑色不必上藥待七日其痔自落用甘石生肌散收功神治遠年內外痔雄豬大腸三尺去肛門七寸刺蝟皮三張新瓦煅存性明礬槐米各四兩上三味為末入大腸內兩頭扎住銅鍋煮爛搗勻成丸每日清晨開水下四五錢藥完不拘內外痔即愈如油膩難丸可加炒米粉和之痔漏內消散一料可愈四人冬青子四兩雨前茶四兩青黛四兩象牙末四兩刺蝟皮瓦焙乾蟬蛻焙各二兩為末以黃雄狗腸一條煮爛搗勻為丸每日清晨酒送下三五錢痔漏不用刀針獨核肥皂一個沙鍋內文火炙之蓋密以脆為度刺蝟皮二個入砂罐內蓋密周圍封固炭火煅過存性推糞蟲炙脆四兩象牙末四兩地龍去土沙四兩上藥為末飛面打糊為丸空心服三十丸服完全愈蔡中軍痔方熊膽二分石蟹胡連明雄黃各五分冰片七釐三七三分爐甘石一錢如癢加枯礬共為細末磁罐盛塞口先將痔潤濕敷上少許不可多用多敷幾次為妙每晚用瓦松七枝皮硝一錢煎湯洗淨敷藥便妙奇驗痔瘡方兼治脫肛立愈核桃一個去內肉入五倍子末合好線扎定外用黃泥入鹽調和團裹炭火煅過至煙盡去黃泥研末滾水吞下即愈班龍靈龜化痔丸治痔漏膿血淋漓人參一兩五錢鹿角尖炙脆八兩龜板四兩炙象牙屑二兩白朮茯苓各一兩五錢當歸四兩穿山甲炙五錢生地熟地各四兩槐角炒六兩露蜂房炙八錢側柏葉蒸陰乾一兩白蓮花瓣二兩上為末煉蜜一斤入白蠟二兩黃蠟八兩下藥末千捶丸梧子大早晚各以藥酒下百丸藥酒方白梅花肉泡淡五錢紅花二兩蒼朮二兩生地一兩五錢當歸二兩核桃白肉一斤入老酒一斗浸七日送藥亦可獨飲不覺退管錠子象牙末萬年冰即糞窖年久磚煅各五錢青鹽輕粉各三錢密陀僧一錢共為末用飯搗丸錠子插入管內數日後其管隨藥而出不疼自然生肌不用收口藥體氣門治狐臭方水銀硝礬各一兩入石禹盆內同研至不見星為度用粗碗盛藥樁實上蓋一碗鐵絲繞緊鹽泥封口將藥碗放炭火上將蓋上碗足內用濕紙打爛鋪四五分厚常以水潤之至加水煙出為度取出冷定開看其藥桂紅色者佳用法濕布拭淨後用吐沫調藥一釐半擦之可五日不臭再擦一遍可一月不臭久久可以除根又方石緑三錢輕粉一錢濃醋調塗五次斷根又方田螺一個挑開靨入巴豆仁一個研碎置螺內一宿即化水取塗之絶根夜間擦數次次早大瀉更妙如不盡再擦之又方水田螺一個挑去靨入冰片一分化水以手指蘸水擦數次愈終身忌食筍食之復發再用前藥復愈外傷門刀瘡神方硃砂為末白糖對配罨患處即刻痛止生肌破傷風方蟬蛻六錢去頭足翅焙乾為末陳酒送下發汗即愈一方川貝去心一錢杏仁去皮尖七個二味口嚼罨患處一日一換愈桃花散千年石灰搗為末錦紋大黃切小塊入鍋內同炒至微紅色共為末用敷金瘡能止血生肌亦治湯火傷以麻油或茶汁調搽紫金藤散專治刀瘡損傷出血紫降香為細末敷患處湯泡鹽滷搗黃泥敷之立愈豬腳殼煅存性麻油調敷神效豬毛亦可或用生地黃水浸搗汁大黃為末調勻敷之亦可或用雞子青調大黃末塗之用炒黃柏亦可又以綿紙鋪患處冷燒酒洗淋亦妙各方並治火燒煙火熏至死白蘿蔔搗汁灌之立醒保生救苦散治火燒油烙及脫肌肉者立止痛寒水石生用大黃黃柏等分為末清香油調敷破濕者乾摻竹木刺入肉羊屎燒灰存性敷之又牛膝嚼爛敷之亦出又酸棗核燒灰存性為末水調敷亦出萆麻子搗敷傷處刺出即去恐去好肉刺入指甲及身生栗子嚼爛以布包裹三時其刺自出中藥箭毒犀牛角削尖入瘡口內立愈又麻油塗之亦愈箭鏃不出杏仁塗之即出羊屎燒灰存性敷罨略出以鉗拔之鉛子入肉水銀二錢灌入瘡口少時倒出如多加幾分是鉛子化的如原數尚未化動再灌入酌量鉛化而止軍中神應金瘡藥降香節紅銅末白松香各一兩五倍子五錢血竭一錢五分沒藥五分共研極細末摻傷處血立止刀斧槍箭傷方生半夏研極細末帶血敷之止痛收口生肌損爛入寸深者千年石灰輕粉血竭白蠟象皮等分研末摻上金瘡折傷血出不止蔥白沙糖等分研爛敷之其疼立止又無疤痕接骨方並治夾棍傷立效小母雞一隻一斤以下者五加皮五錢同將活雞連毛腸搗爛敷一晝夜愈骨斷折碎活蟹一大隻肥而多膏者連殼搗如泥同生姜四兩入醋一鍾帶糟更妙老酒一碗連糟亦可搗勻擠出渣藥汁煎滾灌下將渣炒熱罨患處扎定如只損破不折斷者只吃不罨凡碎骨跌打夾棍等俱神效且能令骨節入臼真妙方也拶手指傷並杖瘡方訶子研末每一錢和銀硃四分蜜調不令水洗敷上以綿紙裹之不痛不爛犯杖臨時預用無名異為末溫酒調服三錢不甚疼不甚傷防夾棍方先一晚用鯽魚一斤搗爛罨上扎定次早洗去不甚疼不甚傷骨跌打損傷並杖瘡初傷服童便陳酒各一鍾防血衝心再以蔥切爛炒熱敷傷處冷則再易止腫消痛散瘀如神如無蔥以熱豆腐貼患處氣如蒸其腐色紫復易以淡為度接骨紫金散土鱉蟲去足焙乾骨碎補乳香沒藥各去油自然銅白硼砂大黃血竭歸尾各一錢共為細末磁器盛每服七釐不可多服恐生余骨陳酒送其骨自合如瘀出未淨亦自下鬼代丹乳香沒藥自然銅無名異骨碎補地龍土鱉蟲各等分上藥為末蜜丸彈子大臨刑用好老酒化一丸如不打吃蔥即解吃素者甘草湯解腳底無故開裂黃柏為末豬脊髓研如膏敷患處如老年者或系氣血兩虧加八寶丹同調敷更妙兩足無故發癢爬至血出始快此係風入皮膚之故用白鳳仙花連根二三株煎湯洗之可得數日不癢婦人穿耳腫爛血竭兒茶沒藥各一錢雄黃五分輕粉二分黃柏一錢白蠟一錢五分松香一錢五分薑黃一錢龍骨煅五分共為末入飛礬少許豬油調敷塗患處樂得打夾棍神方白苧一兩二錢煅存性圓眼肉數十個石菖蒲三錢胡椒二錢一分猴骨六錢白木耳一兩二錢煅大地龍七條瓦煅紅花二錢六分乳香三錢六分麝香三分共為末將圓眼肉搗爛成丸金箔硃砂為衣每丸三錢老酒送下能護心保命夾杖不痛真神方也折傷大活蟹一隻甜瓜子八九錢同搗極爛酒送下三服愈如無瓜子將蟹搗爛熱酒沖服渣罨患處箭傷並針入在骨肉不得出者象牙屑以水和之敷上即出螻蛄蟲煎濃汁滴上三五度即出治金瘡活松木當時燒灰為末一錢松香一錢入鹽少許研勻敷患處一刻生肌湯火傷蚌殼燒灰蜜調敷立愈又水青苔去水敷之干即換之又芋頭磨水塗之即愈又雞子清磨京墨塗上用紙蓋之則不起泡又石膏為末摻之立效人咬指爛欲脫鱉甲燒灰存性油調塗又龜板鱉肚骨等分煅存性麻油調搽又方鞭筍芽或冬筍芽搗爛罨之立效寄杖方好白蠟一兩刮薄片以滾酒沖服之即杖多不痛又方木耳煅存性為末五錢黃酒送下重杖亦不妨手足開裂牛骨髓搽之腳指縫濕鵝掌皮燒灰研搽之周身跌打損傷方至重者先將地上掘一坑如人長約深二尺許用炭燒令極熱以燒酒五六十斤澆坑內隨手以掘起散土拌之將病人埋入坑內熱土蓋之露面人須先飲醉埋二三時令其熟睡睡醒病如失湯火併一切刀傷腐爛大痛沉沙木屑煎湯洗之又燒灰存性麻油調敷立效夾棍神效方皮硝端午日先曬存尤妙好陳酒五斤煎數沸投皮硝五兩下焚桑木北方用柳木不用雜木一枝風爐亦用新者候硝滾化再十數沸傾腳盆中再以爐內炭灰攪入硝酒另用南草紙裹傷處布蘸藥淋之淋他爽快冷則再溫再淋慎勿以手挪患處恐骨動反不能復臼拶傷半料即愈八釐散治打傷兼治爛瘡腫毒土鱉一兩麝二分打傷者八釐酒下破處以此摻之爛瘡內服外摻腫毒服之先治其疼接骨仙丹治跌打損傷筋斷骨碎五銖錢五個火煅醋淬四十九次重一錢甜瓜子五錢珍珠二錢腐煮布包捶碎狗胎骨煅一錢上藥共研極細末每服二分五釐隨患上下飢飽酒送跌打損傷方但稍有氣者俱可救服藥後發戰不必驚怕牛黃花即鬧陽花端午日取花不拘多少去心蒂陰乾研末至重者黃酒送四五分輕者二三分老年力衰者不可多服只一二分如牙關緊鍬開灌下即活刀傷出血痛不可忍用老蔥折斷入白糖在內炭火炙熱剖開其中有涕取罨傷處仍多炙蔥繼之冷則更易三四次即止痛再敷十餘次後以蔥並涕裹纏血止痛息而愈蟲獸傷門癲狗咬方明雄黃五錢芝麻油半鍾沖服立愈鹽物一切可不必忌瘋狗咬方水仙花根搗爛入水白酒一二鍾絞汁以筆管吸飲少頃即上吐下瀉而愈又方甘草杏仁各等分口嚼爛敷患處又方瘋狗舌出尾垂者是斑蝥七個去頭足翅同米一撮炒黃去米研末麵糊丸如梧子大溫酒下候小便桶內見衣沫似狗形者為效如無再服須六七次無狗形方不再發為效愈後以靛汁飲之瘋狗咬傷久而服發透明雄黃三錢麝香五分共研末以酒沖服二錢服後熟睡為度俟其自醒利下惡物再進一服見效又狗咬方此草有一二尺高其葉如山楂背紫根下有疙瘩如有根只用二錢二服即愈紫背天葵葉三錢老酒煮儘量飲之重者三服輕者一服服後化血水而愈七日全好又方斑蝥七個去頭足翅用糯米炒七日外每日加一個雄黃一錢麝香一分小兒不用滑石一兩上共為末能飲酒下三錢不能飲米湯下三錢其毒或從大小便出或吐即愈又方男子二十一日可治女子十四日可治斑蝥七個頭足翅均去米炒去米人弱者減半生大黃五錢金銀花三錢殭蠶七個酒水各一碗煎一碗半飽服候其小便解出血塊再至小便清白方為毒解後食溫粥一碗即止咬傷處用杏仁去皮尖搗爛加砂糖調敷自愈忌食豬羊雞酒魚蔥發氣動風之物又忌麻布夏布衣帳及麻地茄地赤豆地上行走犯之復發不可治豬咬沙糖塗之亦效鮮鯽魚去腸留鱗腹中入羊屎線縫火煅存性為末敷患處或用沙糖水調敷亦可鼠咬方貓屎塗之立愈毒蛇咬方蒲子花七朵搗爛敷患處立愈毒蛇咬方用蜈蚣一條去鉗足煅存性酒下有煙氣自傷處出即愈仙方也又方五靈脂雄黃等分為末酒調服或敷患處亦效守宮蛇咬方用桑柴灰煎水調白礬末塗之蟲入耳方桃葉塞耳或安耳下枕之即出蟲入七竅香油滴之即出豬尾血滴之亦出百蟲入耳方取雞冠血滴入或韭汁或薑汁滴入即出如在左耳以手緊閉右耳努氣至左耳自出誤吞蜈蚣方用生豬血飲之少頃又以清油灌口中其蜈蚣裹在血內吐出然後以雄黃末水調服一方多吃麻油自解蜈蚣及百足蟲傷草紙擦軟絞成條點火取煙燻之傷處少頃痛止再熏一二條愈屢驗蜈蚣咬方香附嚼爛塗之又雞血敷之亦可用雞涎敷亦可又取大蜘蛛放患處其毒吸去將蜘蛛放水中即活治百腳蟲傷蟲隱壁間以尿射人使人遍身作瘡用烏雞翎燒灰雞蛋清調搽即愈蠍子藥並治蜂毒雄黃白砒巴豆各等分為末將黃蠟於端午日午時化開入藥調勻捻成條用時將藥在燈上燒化滴一點於患處覺冰冷即愈蜒蚰入耳方羊乳灌入即化為水又方用蝸牛研為水滴入即出鱉蝨入耳方頭痛不可忍者糯稻草灰煎汁灌之即死而出誤吞水蛭即螞蝗蜜水一鍾飲之即化為水諸毒蟲咬傷痛至垂危青黛二錢雄黃二錢麝香一分為末冷水調服蜂叮人隨嚼青蒿塗在患處立瘥又芋艿擦之芋葉亦可制蚊法蟾酥浸長線圍臥處蚊不能飛入八角蝨方男女便毛生蝨以百部煎湯洗之遂成空殼去蝨方秦艽百部各等分煎汁洗衣永不生矣蚯蚓咬毒形如大麻風眉發皆落每夕蚯蚓鳴於體用白鹽煎湯浸身數次即愈
