body:
  text: 卷三癰疽門灸法治一切癰疽惡瘡初起宜早灸為妙凡人初覺發背欲結未結赤腫焮痛以濕紙覆其上先干處即頭也獨頭大蒜切片安頭上以艾灸之三壯一換痛者灸至不痛乃毒氣散也不痛者灸至痛時方住壞肉不痛灸至痛則肉活矣陰毒不痛灸至痛能變陽若有十數頭研蒜作餅鋪頭上聚艾於餅上灸之不可太烈若初發赤腫一片中間有黃粟米頭子便用蒜片安頭上灸十四壯或四十九壯便毒氣外出否則內逼五臟或曰灸法固佳但頭項上毒似不宜用然東垣用此法治腦疽大約頭毒灸之痛者艾炷似宜小如椒粒壯數宜少若不痛者即大炷多壯亦無妨也又灸法此物以麻油調敷血熱血虛瘡疥神效萬年冰一塊水洗淨為末陽毒以童便和成一餅陰毒以酒和成一餅量毒大小蓋上約厚五分以大艾火灸之不論壯數痛則灸至不痛不痛灸至痛屢效消腫方治諸腫毒兼治項後側少陽經中疙瘩不辨肉色不問大小日月深遠或赤硬腫痛並效生山藥一塊去皮萆麻子一粒研勻攤貼之無名腫毒方當歸八錢三分生黃耆五錢甘草一錢八分金銀花五錢黃酒煎服二帖即愈又方五倍子炒研末用醋攤成膏貼之加百草霜更妙又方鮮山藥搗成泥敷之即消或蘿蔔菜搗碎敷之熱則換亦妙發背腫毒未成方活蝦蟆一個按扎瘡上小半日蝦蟆必昏憒置水中救活之再換一個如前法蝦蟆少困又換之如舊則毒散矣纍效若瘡勢重者看瘡大小或一個或數個破開連肚覆瘡上少頃則必臭不可聞再易二三次即愈慎勿以賤易忽之三生散治諸毒大痛不辨肉色漫腫光滿名附骨癰宜速服之蜂房蛇蛻頭髮各等分共煅存性為末酒下三錢李迅蠟礬丸凡病癰疽發背不問老少皆宜服蠟礬丸服至一兩以上無不取效最能止疼痛不動臟腑活人不可勝數明亮白礬一兩生研以好黃蠟七錢溶化和丸桐子大每服十丸漸加至二十丸熟水送下如未破則內消已破即便合如服金石發瘡者以白礬末一二匙溫酒調下亦三五服見效有人遍身生瘡狀如蛇頭服此亦效諸瘡俱稱奇效但一日中服近百粒則有力此藥非惟止痛生肌能防毒氣內攻護膜止瀉托裡化膿之功甚大服至半斤尤妙古方蠟礬丸治癰疽肺癰腸癰臟毒痔漏服之固臟腑斂肌肉止痛消毒托裡散膿若潰後服此長肉收口黃蠟明礬乳香沒藥雄黃各四兩將蠟溶化離火待溫入各末和勻丸梧子大食前溫酒下二三十丸日三服治一切癰疽方不問虛實寒熱治之皆愈有死血陰毒在中則不痛敷之即痛有憂怒等氣所攻則痛不可忍或蘊熱逼人手敷之則即清涼或氣虛冷潰而不斂敷之即斂遠志米泔浸洗去心為末每服三錢溫酒二盞煎一盞澄清服渣敷患處無名腫毒初起用核桃殼半個以大蒜搗爛填滿以黃紙封口蓋在患處用大艾丸放殼上灸七壯灸三五次即消內消散治一切腫毒貝母知母金銀花白芨半夏薑製穿山甲炒角刺乳香去油赤芍生甘萬年青花粉各一錢上藥酒水各一碗煎八分隨病上下飢飽服渣不再煎搗爛加芙蓉葉末一兩蜜五匙同敷患處一宿自消重者再服一劑必效真人奪命飲治一切癰疽疔腫不問陰陽虛實善惡腫潰大痛或不痛但當服於未潰之先與初潰之際如毒已失潰不可服其功甚捷真仙方也金銀花三錢歸尾一錢五分陳皮一錢五分角刺五分炒土貝七分防風七分赤芍一錢白芷一錢滴乳一錢沒藥五分甘草一錢花粉一錢山甲三片炒用水煎好加酒一杯空心熱服能飲者服後再飲三五杯渣再煎服在背俞倍皂角刺在腹膜倍白芷在胸次加栝蔞仁二錢在四肢倍金銀花服之神效七葉散治熱毒大葉浮萍芙蓉葉棗槐桑柳桃各葉等分入鹽少許蜜少許搗爛敷患處即消呂祖發背方栝蔞五個取子乳香五塊如棗大二味共研末以白蜜一斤同熬膏每服三錢溫酒下炙蘇湯生耆三錢五分連翹三錢去心藁本一錢五分生甘一錢五分羌活一錢五分黃芩一錢黃柏一錢五分知母酒洗生地酒洗澤瀉桔梗各一錢人參五分歸身二錢防風獨活黃連炒陳皮甘草梢參梢蘇木歸尾防己各五分上草二味每劑一兩水煎去渣入酒少許溫服凡瘡不過陰中之陽陽中之陰而已此湯陽藥七分陰藥三分斟酌極妙毒名雖異療則一也醫者萬無一失如飲食不加加枳殼如疔瘡加萬年青如痛加乳香沒藥如疳加車前子木通竹葉燈心如咳嗽加半夏五味子如渴加麥冬花粉大便不便加大黃小便不通加車前子梔子塌腫湯治一切惡瘡發背癰疽疔瘡痛不可忍者或瘡毒入內神思昏倦嘔吐者未成即消已成即潰不假砭蝕惡毒自下又治跌打損傷筋骨疼痛婦人産後肚痛惡路不快赤白帶下等症黃耆白芍川芎當歸陳皮甘草麻黃去節各二兩人參乳香炙沒藥炙各五錢鸚粟殼去頂蒂及筋蜜炙二兩上銼為片每服一兩五錢或二兩水煎溫服凡瘡科能專守此方未有不獲全功者腫香湯治一切無名腫毒淡紅不赤堅硬不起者此係陰症非此藥不能治也專治下焦癰疽毒骨疽當歸一兩芍藥甘草牛膝川芎黃耆各三錢木通五分乳香炙沒藥炙各一錢金銀花六錢水二大碗煎服洪寶丹花粉三兩薑黃赤芍白芷各一兩上藥為末陽毒用蜜或茶汁調敷患處留頭陰毒酒敷留頭湯火傷雞子青麻油調敷金瘡流血不止留出傷處四圍用麻油調敷可以止血如意黃金散治癰疽發背疔腫乳癰丹毒跌撲損傷濕痰流注大頭時症漆瘡火丹風熱天泡肌膚赤腫乾溼腳氣及一切頑惡腫毒隨用輒效花粉上白者十兩大黃黃柏色重者薑黃各五兩白芷三兩紫厚朴陳皮甘草蒼朮南星各二兩共為細末瓷器收貯勿泄氣凡遇紅赤腫痛發熱未成膿者及夏月火令時俱用茶清同蜜調敷如微熱微腫及大瘡已成欲作膿者用蔥湯同蜜調敷如漫腫無頭皮色不變濕痰流毒附骨癰疽鶴膝風用蔥酒煎調敷如風熱惡毒肌膚亢熱紅色光亮形狀遊走不定蜜水調敷天泡火丹赤遊丹黃水漆瘡惡血攻注等症用大藍根葉搗汁調敷加蜜亦可湯泡火燒皮爛麻油調搽保元大成湯治潰瘍元氣素虛精神怯弱或膿水出多神無所主睡眠昏倦六脈虛細足冷身涼便溏或閉胸膈不寬舌少津液口食無味瘡弦不緊肉色微紅一切不足之症人參白朮黃耆炙各二錢茯苓白芍陳皮歸身附子制炙甘草萸肉五味各一錢木香砂仁各五分煨姜去皮三片大棗三枚水煎空心服服至精神回手足暖脾胃醒肉色紅為度數症乃元氣虛脫欲變壞症非此不能回陽也或潰瘍發熱或惡寒或作痛或膿多或膿清或自汗盜汗遍身流注瘰癧便毒諸瘡久不作膿或膿成不潰潰而不斂服十全大補湯若元氣不足結腫未成膿者加陳皮半夏香附連翹服之自消花草湯治癰疽初起生甘五錢金銀花三兩當歸一兩元參五錢花粉二錢白礬一錢附子一片水煎服初起一服即消腫起者二服即消發背初起此方活人已多未潰者微出黃水既潰者能收口穿山甲四片牛皮膠四兩新瓦上燒灰研細和勻從容服完永無大患外用牛皮膠少加薑汁水熬如稀糊以布攤貼極妙或筆蘸塗周圍干則再塗又方將泥水調塗疽上看其何處先燥即用墨圈以竹管蓋定取螞蝗數條入竹筒內令螞蝗吸盡惡血去蝗用艾火隔蒜灸之其毒有頭可無他患蟾酥丸治發背疔腫喉毒小兒急慢驚風痘疹傷寒寒症等候硃砂雄黃各五錢麝香三分為細末端午日以蟾酥丸如緑豆大每服三丸蔥油送下取汗為效咽喉腫痛點患處立效壺公丹治諸般腫毒陰症附子一個半生半熟以麵包煨倍子五錢炒微黑麻黃五錢枯芩五錢甘草節五錢共為細末用米醋調塗留頭神煙治一切無名腫毒背疽疔瘡立效桑樹嫩枝銅刀切碎香爐貯微火燒熏患處再用桑枝煎濃汁絹帕蘸拭患處屢拭熏至一二時後或膿丁躍出或流紫血而愈咬頭方蟾酥麝香各等分為末摻上瘡口又方二蠶出過蠶蛾繭一個燒灰酒送下即出只服一個切勿多服如多服一個即多一頭矣化腐紫霞膏治堅頑瘡毒發背已成瘀肉不腐不作膿者或諸瘡有膿而外不穿潰俱用此膏不爛者自爛不潰者自潰功甚於烏金膏碧霞錠子輕粉萆麻子研各四錢血竭二錢巴豆仁二錢潮腦一錢金鼎砒五分螺螄肉曬乾二個為末瓷罐收貯用時以麻油調搽頑硬肉上以棉紙蓋貼或膏貼俱可至頑者不過二次即敷腐為膿點諸瘡上亦破六合回生丹治癰疽發背潰爛者有回生之妙兼治臁瘡下疳鉛粉一兩炒黃色輕粉銀硃雄黃沒藥乳香並炙各二分五釐上藥為細末收貯遇病者先煎茶汁將瘡洗淨軟帛拭乾後剖開豬腰子一枚去膜用藥一分摻腰子上貼患處待腰子發熱如蒸良久取出自此毒減痛定瘡口出膿不可手擠第二日仍依前法敷之第三日亦如此瘡勢惡甚可敷八九次瘡小隻用一敷可愈如腰子不發熱不治對口亦用前法臁瘡久爛者將黃蠟溶化加飛丹調如膏攤油紙上量大小裁定蠟紙炙熱將前藥一二分摻上貼之將綿紙縛住任瘡口出惡血即愈下疳瘡量用豬腰子摻藥如前法貼若龜頭爛者以尖刀穿開腰子納藥套上良久並用棉帛縛之切忌毒食焦閣老施此藥毒重者加至三五分拔毒尤速瘡口大腰子不足再加半個必用相連量瘡口大小摻藥腰子用過深埋之治諸毒已破者如未破者不可用用葫蘆殼燒灰存性麻油調敷留頭三日毒盡收口或用桃枝竹去青刮肉搗軟蒸熟罨之數日即收口八寶丹琥珀一錢新瓦炒珠子四分象牙一錢火煅外黑內帶白色冰片二分乳香炙一錢沒藥炙二錢兒茶一錢血竭一錢上藥為細末摻膏上貼之即收口收口長肉神方背疽惡瘡並效將甘蔗渣曬乾火煅存性研細以小竹管如瘡口大用細夏布扎緊篩灰於瘡上填滿外以膏貼之自收口斂口生肌散此治已潰瘡若有一人患背疽已潰如碗麵大視五臟僅膈膜耳自謂必死人傳此方用之而愈大鯽魚一個去腸以山羊糞入其中烘焙焦黑為細末乾摻之瘡口遂收而愈屢試皆驗須候膿少欲生肌時用之久遠瘡口不收方醋煮桑葉貼之即收口長肉生肌散龍骨煅二錢血竭三錢象皮一兩炒兒茶二錢甘石二錢煅乳香沒藥各一錢去油冰片二分共為末瓷瓶收貯用時以少許摻膏藥上生肌膏輕粉一分半密陀僧三分水粉一錢冰片三釐龍骨煅一分銀硃五分赤石脂八分上為末熟豬肉油調和敷患處外用膏蓋之珍珠散生肌用爐甘石五錢防風生地甘草連翹花粉白芷大黃各三錢上煎濃汁火煅甘石令紅淬汁內再煅再淬以汁盡為度冷定研細末加冰片二分研勻摻瘡上以膏蓋之黃連消毒飲專治腦疽對口及一切頭上太陽經病初患三日者服之立效又治骨槽風初起二劑而愈真神方也生地酒洗連翹桔梗羌活歸身各一錢炙黃耆人參炙甘草生甘梢陳皮歸尾黃連生黃耆防風獨活藁本防己酒洗蘇木黃柏黃芩各五分知母四分酒洗澤瀉七分用水三鍾煎盅半加酒一小杯再煎數沸食後服痛甚者加乳香沒藥各一錢去油同煎服凡服後不得飲水恐再作膿效遲對口仙方鯽魚一個去鱗腸搗爛入頭垢五六錢再搗極勻加蜂蜜半盞攪勻從外圍入裡面留一孔出氣塗二次全消即時止痛如已成形有頭將出膿及已出膿者內服三香定痛飲或千金內托散則能起死回生矣又方用抱小雞母出窠時熱糞塗之即愈神效肺癰奇方薏米仁為末糯米飲調下或煮粥吃又方野芥菜又名山芥菜搗自然汁酒漿和服立愈又方鮮百部根搗汁一盞入酒漿一盞灌下兩時辰即效三服吐白痰或口渴飲水不妨忌飲茶危急者用此即效地羅湯治肺癰胸膈作痛咳嗽尤痛手按氣急元參麥冬各二兩錦地羅生甘草各一兩桔梗貝母