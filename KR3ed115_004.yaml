body:
  text: 卷四婦人門益母丸益母草四十斤熬成膏約三斤真龜膠一斤蛤粉炒白當歸二斤川芎一斤俱蒸熟上三味為末入益母膏為丸每丸重三錢曬乾磁瓶收貯胎動不安蘄艾湯下催生砂仁三錢煎湯下産後血塊痛紅花湯下血暈山楂湯下虛脫人參湯下血崩人參湯下産後痰多昏亂不知人事醋炒紅花湯下月水先期或一月兩次或懨懨不息人參條芩杜仲湯下月水過期非紅非紫桃仁紅花湯下赤帶用赤雞冠花白帶用白雞冠花煎湯下血枯紅花湯下肉淋黃連人參湯下吐紅黃芩側柏湯下便血地榆湯下虛損熟地白芍陳皮湯下陰虛潮熱往來沙參湯下骨痛地骨皮湯下男人白濁三角酸煎湯下夢遺茯神杜仲白雞冠湯下腳跟腫皮脫出水牛膝湯下心痛桃仁湯下血虛頭疼川芎白芍湯下腰痛杜仲湯下腰痛脅脹氣衝胸塞芍藥杜仲湯下益母膏又名還魂丹五月五日六月六日或小暑日益母草花正開時採取花葉子石臼內搗汁沙鍋內文武火熬膏忌鐵器每服五錢或一兩胎動腹痛下血不止當歸湯下産後帶下阿膠湯下産後血暈口渴狂言産後中風失音口噤血結奔痛時發寒熱面赤心煩或鼻衄舌黑口乾童便和酒下産後咳嗽噁心吐酸脅痛無力黃酒下産後瀉血紅棗湯下産後痢疾米湯下産後崩漏糯米湯下橫生逆産胎衣不下炒鹽湯下産後二便不通煩躁口苦薄荷湯下凡産後以童便化下一服能安魂魄調經絡破血瘀凡經不調者服之則調無子者服之則孕婦人之聖藥也獨聖散丹參為末酒下二錢此藥破宿血生新血安生胎落死胎止血崩帶下調經脈或前或後或多或少及冷熱勞傷腰脊疼痛等症俱治女金丹人參當歸生地丹皮白茯苓白芷玄胡索酒洗肉桂白芍藁本去蘆酒洗沒藥去油川芎白薇酒洗各二兩沉香赤石脂酒漂甘草各一兩共為細末蜜丸或益母膏為丸硃砂五錢為衣女人不孕經後當歸川芎湯送下一丸重三錢每日服一丸三月後必孕胎動欲産開水送下一丸睡片刻即安每月服三五丸保定足月分娩琥珀滋生丸治婦人胎前産後百病琥珀一兩醋炒燈草同研阿膠一兩炒成珠五味子五錢附子制各一兩夏五錢肉桂去粗皮五錢沉香五錢不見火川芎五錢桑寄生當歸肉蓯蓉人參續斷熟地沒藥炙木香不見火延胡索乳香炙各一兩牛黃三錢硃砂一兩為衣各製為淨末先將益母草八兩揉碎加水十碗熬成一半去渣慢火熬成膏和藥末少加老蜜搗千餘下分為百分每丸重一錢四分硃砂為衣陰乾再曬極干黃蠟為殼每服一丸凡腦脅疼痛繞臍腹痛及嘔逆上氣築心痰喘不進飲食用薑汁少許和酒化服諸色痢疾及赤白帶下血冷血崩漏胎下血用生薑艾葉炒令黑色酒煎數沸調服泄瀉不止陳米飲調服尿澀諸淋通草燈心湯下血暈不知人事童便調灌半丸醒後當歸湯服一二丸上熱下冷人參湯服遍身虛腫水氣赤小豆湯調服産內二毒傷寒及中風角弓反張麻黃湯調服被蓋出汗月經不通或間雜五色頻頻而下斷續不止飲食無味肌瘦面赤唇焦乍寒乍熱四肢頻痛五心煩熱黑皯血斑赤腫走注血風勞傷並用童便入薑汁少許服臨産用酒下一丸易産常服以童便加酒一半免噁心懷胎臨月一日一服至産下不覺疼痛或服至十日飲食倍增是藥力也其功不能盡述四制香附丸此婦人之聖藥種子之奇方屢試屢效香附二斤分四處一童便一米泔一米醋一鹽水各浸七日一日一換取出炒黃勿焦當歸酒洗一斤熟地艾葉二兩煎湯拌蒸川芎白芍條芩炒各八兩血熱加生地八兩共為末蜜丸空心清湯下九制香附丸治婦人百病調經種子安胎神效香附十八兩杵淨分作九分每分二兩一酒一醋一鹽水一童便一小茴二兩煎汁一益智仁二兩煎汁一梔子炒黑二兩煎汁一萊蔔子二兩煎汁一白附子制石菖蒲各一兩制共煎製法各汁俱春浸三日夏浸一日秋浸五日冬浸七日浸至日足連渣同香附曬乾檢出香附再將香附合一處入砂鍋內用蘄艾五兩無灰陳酒同煮酒干再添再煮須至煮香附黑色為度取起曬乾為末聽用香附末八兩歸身酒洗大熟地薑汁蒸大生地薑汁洗白芍酒炒各四兩川芎酒洗三兩白朮土炒四兩甘草蜜炙九錢棗仁炒二兩人參一兩茯苓一兩天冬去心二兩七錢益母草嫩葉四兩山萸肉二兩真化皮二兩元胡醋炒一兩阿膠蛤粉炒四兩條芩酒炒二兩砂仁連殼一兩五錢上藥各制如法共為細末蜜丸梧子大必須早晚各服三錢清湯下服至一料不孕者必孕既孕者堅固易産且凡舊有之病俱已消除神效調經方香附二斤分四分一酒一醋一童便一蜜水俱浸一宿曬乾炒為末取淨末一斤歸身酒蒸川芎酒蒸艾葉醋炒條芩阿膠蛤粉炒成珠各三兩上藥共為末用益母草煎膏為丸如梧子大清湯送下三錢用以調經種子安胎俱神效勝金丹治女人胎前産後一切淋濁帶下月經不調並血枯不孕小産難産血暈血瘀停胞死胎等症並男婦諸虛百損香附一斤分四分一童便一酒一醋一鹽水各浸一日曬乾炒藁本三兩歸身川芎人參赤芍白芍白芷各一兩五錢甘草炙七錢五分熟地四兩五錢丹皮三兩白茯苓牛膝杜仲各二兩五錢白薇去蘆四兩以上俱酒浸一宿曬乾為末赤石脂白石脂各二兩五錢以米醋浸透煅紅共七次為末硃砂琥珀各五錢乳香沒藥各一兩以上四味用酒研爛如膏和入前藥末內擦磨數十次令極勻加蜜煉為丸如彈子大金箔為衣每服一丸陳酒下婦人不孕方雞一隻黑骨白毛者佳如無用三年陳騸雞亦可益母草一斤分四分一酒一醋一薑汁一川芎汁各浸透炒乾總入雞內用重湯煮雞淡吃或酒送亦可雞骨並藥渣焙乾為末加歸身四兩續斷二兩姜六錢為末蜜丸每日早午晚酒送各三錢一料即孕伏龍肝孕婦傷寒恐致墮胎用灶心土對鑊臍處取一塊研末溫水調塗臍上一日一換至七日之後即不墮如盤腸生者塗頭頂母腸即收如胞衣不下或死胎不下者塗腳心即下或送二錢亦可月水久閉方二蠶砂四兩炒黃色即入無灰酒一壺於砂鍋內滾二三沸取起以瓷器盛之去沙酒略溫飲數杯經血逆行方韭菜搗汁一盞入童便半盞燉熱服即止白帶方鹿角燒灰為末每早酒調下二錢一二次即愈又方藕節八兩赤茯苓白茯苓赤茯神白茯神柏子仁去油益智仁鹽水炒各一兩為末金櫻膏為丸梧子大每服三錢清湯下藥盡病愈赤白帶下方棉花子炒黑去殼研末米糊為丸每服三錢赤帶用沙糖湯下白帶用白糖湯下又方黃狗頭骨一具燒灰存性每服三錢服完即愈白帶丸方藕節八兩芡實二兩白茯苓一兩白茯神一兩山藥三兩蓮鬚一兩五錢蓮子二兩金櫻膏十八兩上藥為末膏丸服藥完病愈又方並治遺精赤白茯苓各四兩赤白茯神各四兩柏子仁五錢益智仁五錢共為末米糊為丸梧子大每早陳酒或清湯送下血淋方車前子二錢葵根一錢水煎多服效又白荷花煎湯飲立愈沙淋方車前草搗汁半碗入蜜一兩懸井中五更溫服效如白淋去蜜加沙糖一兩行經腹痛方兼能種子真蘄艾紅花當歸益母草各三錢酒煎另用雞蛋一個刺數孔入藥罐內同煮熟即以藥汁同雞蛋吃下不過三個痛止即受胎子宮脫下方治婦人濕熱煩勞太過子宮陰中脫出無論有娠無娠俱可服藿香臭椿皮荊芥各三錢煎湯洗之如已收上可不必服藥如不收上即服後方人參一錢炙耆一錢五分白朮一錢歸身八分炙甘五分陳皮五分升麻二分柴胡三分梔子炒黃芩酒炒車前木通澤瀉各一錢如上焦有火頭眩去人參加沙參二錢薑棗為引服一二劑即愈再用歸皮湯調理不可煩惱為要崩漏方阿膠五錢炒為末乾薑五錢炒黑香附五錢醋炒黑蘄艾五錢將姜附艾三味用好酒二杯煎一杯和阿膠末空心熱服覺熱至臍即止患一年者二帖三五年者四帖全愈更用後藥除根白雞冠花五錢炒炙甘二錢百藥煎二錢木耳二錢白芷一錢共為末每日空心當歸湯送二錢藥完永不再發血崩神方真阿膠二兩炒慎火草即火炎草炙焦研二兩棕毛燒存性一兩龍骨煅牡蠣煅蒲黃炒黑烏梅肉焙焦各一兩共為末蜜丸梧子大空心酒下三錢血崩不止方蓮蓬殼荊芥穗燒存性各半為末每服二錢米飲湯下又方棉花子燒存性酒下三錢立止保産無憂方歸身一錢五分酒洗川芎一錢五分厚朴七分薑汁炒白芍一錢二分酒炒冬月只用一錢羌活五分枳殼麩炒六分菟絲餅一錢五分荊芥炒黑八分川貝去心一錢蘄艾醋炒七分黃耆炙八分炙甘五分姜三斤空心煎服六七月即可服臨月服三五帖甚妙難産橫生胎動不安等症並治兼能下死胎鯉魚湯孕婦五六個月腹大異常高過心胸者乃胎中蓄水如不治子母難保此方主之當歸酒洗一錢五分白芍一錢五分白茯苓二錢白朮炒二錢五分陳皮三分用鯉魚一尾重半斤之上去鱗腸白煮熟去魚留汁二盞加姜三片同前藥慢火煎至一盞空心服如未愈再服胎衝上心危急方白朮五錢條芩二錢白芍四錢枳殼一錢水煎服如人壯健單用枳殼五錢煎服亦可阿膠丸治娠婦大便閉枳殼麩炒阿膠炒等分為末蜜丸梧子大六一散為衣清湯下二十丸未通可加至五十丸真人安胎散舊葵扇燒灰三錢二蠶砂二錢共為末用鳳凰衣十四張煎湯送下阿膠酒孕婦血痢並下血皆妙阿膠炒二兩酒一斤半煮化服或黃明膠亦可二神散治娠婦痢雞子一枚破頂去白留黃入黃丹一錢攪勻封口鹽泥固火上煨焙泥干取出為末米飲湯下一服愈是男二服愈是女胎前産後下痢方敗龜甲以米醋炙為末調服自愈娠婦下痢方黃柏蜜拌炒焦為末蒜煨熟去皮二味搗為丸桐子大空心米湯下三五十丸一日三服妙不可言止啼湯治妊娠兒在腹中啼黃連二錢甘草一錢水煎服立愈達生散當歸酒洗白芍酒炒人參白朮土炒陳皮紫蘇各一錢炙甘二錢大腹皮酒洗三錢青蔥五莖枳殼八分黃梁木腦頭七個春加川芎一錢夏加黃芩一錢孕婦八九個月服數十劑有力易生較勝瘦胎散育麟丸專治一保胎服至七個月平安可以止藥人參一兩五錢條芩鹽水炒二兩歸身杜仲各三兩白朮炒四兩川斷酒浸一兩五錢陳皮一兩熟地一兩五錢阿膠炒二兩香附童便浸曬乾四兩共為末米糊為丸緑豆大空心服七八十丸清湯下一方加黃耆蜜炙一兩五錢通産散臨産交骨不開五七日不生及矮小女子交骨不開死在須臾服之一二寸香時即下敗龜板一個炙四兩女人發一握洗去油煅存性擇生過男者當歸全用四兩川芎二兩乳香四錢益母草研頭末四兩共為末每服六錢圓眼湯下有力者加人參一錢煎湯下更妙難産方麻油五錢好蜜一兩同煎十數沸溫服胎滑即下鼠腎丸鼠腎子一對用燒酒浸三日去皮膜輕粉雄精各一錢檀香三分麝一分研成丸分十二粒勿經女人手勿令一人見陰乾瓷瓶收貯俟交骨開清湯下一丸立效如有二鼠另作一料另貯勿混橫生方於本婦右腳小指頭灸三壯艾如麥粒大神驗潤胎方産婦胎未下而胞水先流則乾澀難産以車前子二三兩酒半碗水四碗煎服胞衣不下方瓦松煎汁服一口即下或用蟬蛻瓦焙乾為末清湯下一刻即落神效又方小貝母七個去心煎服立下治子死腹中不出方黃牛屎炒熱醋調敷母臍即出催生遇仙丹蛇蛻一尺新瓦上煅存性萆麻淨仁七粒搗爛硃砂雄黃各一錢共研為末入厚粥少許為兩丸候胞破水下安臍中一丸清涼膏封固胞下速去不可忘記切切血暈方此物須預備韭菜一把寸斷入酒壺以滾醋泡之塞大口用小口觸鼻即醒如昏迷打呵用人參一錢虛則多加用韭菜根酒煎入醋半小杯服之立止生化湯當歸全五錢川芎二錢炮姜四分炙甘四分桃仁十粒紅花八分水煎服如汗多減用川芎五分小腹急痛加元胡索一錢汗出如油不止加參耆血暈則先以薑汁童便飲之如止血塊作痛原方加韭菜白四十九根如不眠加益母草三四錢如停食加消食藥以暖胃為主肉食加山楂肉通乳方治産後乳汁不通木通二個豬前蹄一個煮爛並汁食之即通又方豬前蹄三隻木通五錢石膏五錢煮熟食蹄與湯即通産後無乳方凡乳母不宜吃豬肝黑芝麻炒焦為末三錢熱酒沖服或用豬蹄湯沖服更妙催乳散漏蘆通草各一錢貝母二錢白芷一錢共為末用豬前蹄一個酒水各半煎湯送下不可用鹽神效子腸不收方枳殼三錢煎服即收縮舌散治産後舌出硃砂為末敷之或將盆急擲驚之即收並治房欲後舌出不收即將本婦鞋底炙熱頂項頤三處尉之産後經風方柚子皮二個金銀花半斤蘇梗一兩過海風藤四兩防風一兩茄杆一兩青松毛半斤甘草節二兩煎水一大鍋傾盆內患人坐於上圍以綿被勿令出氣熏二次後可服煎藥華他愈風散治産後中風口噤手足瘛瘲如角弓式産後血暈不省人事四肢強直或心腹倒築吐瀉欲死荊芥穗微焙為末每服三錢酒調服或童便溫服噤口則挑齒灌之入鼻中亦效荊芥乃産後要藥角弓反張産後惡候得此症者十存一二而已又産後因怒發熱以致迷悶亦如上治之男婦中風口噤酒服二錢立愈血塊痛方伏龍肝三錢研極細黃酒服三錢立愈止乳方婦人子壞而乳不收恐生乳病者用之麥芽一兩水煎溫服乳即收上兒科門白膜裹舌小兒初生有白膜皮裹舌或遍舌根可以指甲刮破令血出以煅過白礬如米粒少許敷之如不急治則啞生下無氣小兒生下沒氣者切不可棄之即用新綿裹暖以胞衣放鍋上架起鍋內著水漫火蒸令熱氣貫於腹內男則左腳大指先動女則右腳大指先動且不得住蒸俟其心腹間吻動即止將臍帶留長咬下仍以綿絮包裹必須對日方能出聲頭裂奇方一小兒方七月連胞生下破胞而出與乳吃得活至三日後忽頭破作四塊此乃母力不足之故以母頂心發燒灰敷之即合撮口臍風小兒初患之時齒根上有小泡如粟米狀急以溫水蘸青軟絹裹指輕輕擦破兒口即開便安不必服藥若臍風一成必有青筋一道上行至肚而生兩岔宜灸筋頭三壯截住若見兩岔即灸兩岔三壯十活八九遲則上行攻心死矣鵝口白硃砂二錢硝一錢五分枯礬三分鵝口皮一錢陰乾火煅存性共為末先用亂髮裹指將口內白拭去用井水調藥雞毛挕之臍不幹亂髮燒灰敷之效臍風青筋神效方南星半夏各五分天麻全蠍各三分巴豆霜一錢上為末米糊為丸粟米大每服五丸用牛黃少許磨水送下其青筋處用燈火打數十次立效小兒初生用胡桃去皮嚼爛以綿包如乳頭樣使兒吮汁盡待其腹內汙物去盡並無瘡毒之患稀痘方赤豆黑豆緑豆各一撮甘草節五分不時煎服屢驗凡鄰近出痘即與兒食可免不出即出亦輕又稀豆方硃砂一分五釐飛淨黃連一分五釐甘草一分五釐臍帶本人者瓦煅存性上藥四味各為細末蜜調一日夜於小兒口內抹完則痘不出即出亦少又方將臍帶瓦上焙乾每重一分用硃砂五釐當歸生地煎濃汁一二蜆殼調帶末抹兒上齶並乳頭上一日內抹盡次日大便下穢汙濁物終身永無瘡疹之患絶痘方用活烏鯉魚一個入硃砂五錢放魚口內縫好陰乾如端午日製到冬至日煎湯與兒洗浴冬至日製端午洗浴過三次痘永不出矣如不信留一手一足驗之稀痘丹立春前後三日內採半開半含紅梅花蕊一茶鍾去蒂仍放鍾內以碟覆蓋一周時其氣汗自然升上卻用新擂盆未用過五辛者搗如泥撳成餅將透明硃砂飛過一錢勻摻上緩緩研和少加白蜜為丸如龍眼大曬半乾金箔為衣每遇四絶日服一丸甘草湯下忌鐵器葷腥當晚微微發熱次日遍身出瘰是其驗也痘初起將臨清濟寧上好油胭脂點兩眼角則免壞眼痘疹神效三蠟丸方三丸俱用黃蠟為殼化毒黃蠟丸硃砂五兩明亮當歸生地各一兩犀角要帶黑有棕眼人參各五錢川連葛根黃柏荊芥穗甘草各四錢白朮牛蒡子連翹各七錢升麻二錢牛黃一錢五分活取者佳上切片將硃砂打緑豆大絹袋裝縫水十碗酒二碗同藥入砂鍋內文武火煮之只剩一碗汁為度攄淨拌硃砂曬乾為末以豬心血調糊為丸每丸乾重五分凡痘初出即細研一丸用薄荷湯調服痘即減少輕快其效如神此方傳自異人用硃砂仍用補氣和血解毒快斑托元清心諸藥煮之功效甚大保嬰之仙方也又有後二丸方各奏奇效痘疹始終病症盡於三方之中務須炮製精虔內有犀角能清心火去難解之毒牛黃清熱祛骨髓難拔之毒硃砂鎮心寧神解周身之毒人中黃降火清心解毒復元蓋痘毒結於受胎之始根深蒂固臟腑俱蘊熱毒若非金石大力珍重藥味豈能透骨清髓掃蕩臟腑之真毒乎有心濟世者其加之意焉快斑紅蠟丸當歸紅花汁浸焙乾熟地薑製生地酒洗人參各二兩白朮川芎各一兩酒炒元參白茯苓各八錢荊芥穗牛蒡子炒各七錢犀角鎊三錢牛黃一錢五分甘草六分人中黃二錢人屎燒五錢上為細末蜜丸如皂角子大三歲兒服一丸一歲服半丸薄荷燈心湯下此丸專治五六日上痘疹不起起而膿不全全而不厚煩憊不寧或遍身癢塌間有乾黑者若不急為益血補氣內托化毒大復元氣則膿不滿而回靨凶矣縱目前苟免大患而倒靨倒發痘毒日久不痊者多矣百解緑蠟丸歸尾紅花汁浸二兩生地一兩二錢白朮八錢人參八錢牛蒡子炒八錢牛黃一錢犀角鎊花粉滑石各六錢水飛人中黃威靈仙酒浸各五錢白丹皮七錢大黃酒浸蒸曬三次一兩二錢祛毒復元全在此味檳榔升麻汁浸四錢上為細末蜜丸皂角子大三歲一丸一歲半丸蠟丸收貯愈久愈效此丸專治十二日後痘瘡倒靨毒氣內收不能散降顧伏於臟腑之間乘虛而發變症百端或為痘瘟痘疔倒靨倒發毒盛危急等症惟此以化毒為主斯免爛膚腐筋潰鼻蝕牙喪明之患此丸能祛臟腑之毒俱從二便徐徐降下不傷元氣不損脾胃雖至弱者服之亦不知毒從何去真元如何自復也凡服藥以燈心薄荷湯下以上三蠟丸歷著奇效妙難盡述取用簡便而奏效甚神痘瘡黑黶方獖豬第二番血清半盞和冰片一分溫服良久下痰血一二次痘即紅起矣痘瘡破爛方用陳年松花或干緑豆粉或蕎麥麵敷之愈痘生眼內方刺鱔魚之血點眼不生蘿蔔花又以麥冬三錢去心搗爛貼足心其痘自落痘後回毒膏兼治諸般熱毒麻油四兩入番木鱉一兩去毛同油煎枯撈出木鱉入壯人頭髮三兩熬化滴水成珠加飛丹二兩收成膏貼一個即消又方八月採田塍邊野毛豆連莖根煅存性為末真麻油調敷不問初起日久已潰未潰神效用豆更妙婁金散犬屎內骨七分經霜糞更妙多收布包打碎水淘出骨洗淨搗爛金銀花三錢水煎服不問寒熱虛實初起一服即消已潰即斂神方也移回毒法治痘毒生在枝節緊要處白豆為末水調敷之即攻平肉處發毒以免後患痘後餘毒移法或生於手足節彎處不知治法恐成痼疾須於毒腫起時即剝蝦蟆皮貼之內服敗毒藥則毒移於他處矣金氏七寶丹蛇含石六兩代赭石六兩二味以銀罐盛貯炭火內燒紅陳米醋淬其細者自沉醋底粗者撈起再煅再淬以淬完為度研極細末大南星四兩薑汁煮透白附子五錢麝香一錢五分硃砂五錢為衣金銀箔不拘多少亦同為衣上為細末於端午正午時用米粽入臼搗爛丸如芡實大用微火烘燥瓦瓶盛之密封勿泄氣專治小兒急慢驚風傷風疳病食積風痰氣喘夜啼以生薑一片薄荷一團竹葉七片燈草一團為引然藥性惟鎮心卻疾一味墜下凡痘疹盛行時不宜遽進切記又七寶丹膽南星五錢麝香二分五釐天竹黃山藥各三錢鉤藤羌活各三錢全蠍一錢琥珀珊瑚各三分牛黃二分上為細末蜜丸梧子大辰砂金箔為衣急慢驚風薄荷湯下感冒風寒發熱薑蔥湯下內傷飲食生冷清茶下心腹痛霍亂吐瀉淡薑湯下伏暑傷熱積聚身熱清湯下大小便閉燈心湯下泄瀉米飲下夜啼燈草薄荷湯下量年紀大小一丸半丸不拘時服抱青丸治小兒驚風痰嗽口臭喉腫痰涎壅盛厥逆癲癇一切風火等症及大人痰火症神效雄精辰砂琥珀屑各二錢竹瀝霜五錢明天麻七錢麵煨膽星一兩九制珍珠五分金箔一百張麝香五分上為細末甘草熬膏作丸如芡實大硃砂為衣薄荷燈心湯下一丸取竹瀝霜法用大瓷盤數面曝烈日中極熱少入竹瀝蕩開止令盤濕不可過多取其易干多盤攤曬以竹片括下收貯但竹瀝清淡成霜較少今立一簡便法門取上號天竹黃研細水飛入瀝曬乾再入再曬以加重五錢為度用之功效相等消疳丸治疳眼因飲食失節以致腹大面黃肝血不能養目先治其疳而目自愈忌麵食炙爆發物蘆薈一兩煅胡黃連五錢五穀蟲先洗瓦焙乾二兩同研為末蜜丸彈子大每空心米飲湯下一丸至腹小服理脾丸理脾丸陳皮茯苓山楂半生半蒸各一兩白朮炒二兩黃連炒蘆薈煅炙甘共為末神麯黃米糊丸彈子大薑湯下集勝丸銅璧仙人曰凡治疳不必細分五疳但虛則補之熱則清之冷則溫之吐則治吐利則治利積則治積蟲則治蟲不出此方加減用之屢試屢驗蘆薈煅五靈脂去泥沙炒夜明沙淘淨炒黑使君子蒸取肉一半生一半熟砂仁去殼橘紅木香莪朮醋炙各一錢川連川芎乾蟾炙焦各三錢當歸青皮炒各一錢五分虛人加人參三錢白朮五錢去莪朮青皮因於熱者加膽草三錢去砂仁莪朮因於吐瀉下痢加白朮二錢肉果煨訶子肉各一錢五分去莪朮青皮因於風搖頭揉目者加天麻羌活各二錢因於積痛者加煨三稜川楝子肉小茴香炒各二錢去川芎當歸因於瘧者加醋炙鱉甲三錢因於蟲者加白蕪荑一錢五分川楝子二錢去川芎當歸因於渴者加人參白朮各二錢去砂仁莪朮上為末雄豬膽汁二個打神麯糊為丸如緑豆大每日米湯下十丸千金散治小兒一切痰喘急慢驚風雖至死咽下即活全蠍炙三分硃砂四分水飛牛黃六釐炙甘一分麝香二釐膽星二分黃連天麻各四分殭蠶三分共為細末用五六釐薄荷燈心同金銀花煎湯不拘時調服活絡丸治臍風撮口急慢驚風痰膠滿口牙關緊急角弓反張等症川牛黃一分辰砂五分蜈蚣一大條炙全蠍全者三個酒洗炒麝香少許膽礬三分巴豆五粒水一碗煮乾殭蠶五條水洗炒輕粉三分焰硝二分上研細末用牙皂煎湯糯米粉打成糊為丸緑豆大每服七丸蔥白煎湯下以利為度五疳散專治小兒五疳潮熱面黃肌瘦煩渴吐瀉肚大青筋手足如柴精神疲倦歷試有效無疾預服諸疾不生元氣虛弱者服半月自然身體輕健白朮蜜水炒一兩五錢白茯苓使君子各七錢五分碎炒甘草一錢五分山楂肉麥芽炒金櫻子肉炒蓮子心隔紙炒橘紅各五錢麥冬去心一兩芡實蒸二錢五分青皮二錢麩炒共為細末蜜丸每服一錢清湯下回生丹治小兒慢脾風附子童便制人參各五錢天麻一錢紫河車一錢全蠍一錢五分炒山藥三錢炒硃砂一錢珍珠五分天竺黃鉤藤各二錢五分琥珀牛黃各五分茯苓二錢金箔十帖上研細末麻油老酒服一歲者一分量兒大小加減服治急驚風方辰砂天竺黃各一錢冰片麝香各一分月石三分青黛五分雄黃三分珍珠牛黃琥珀各一分上研細末蜜丸黃豆大薄荷湯調下一丸走馬疳陳年糟茄一二個燒灰存性研末敷上一二次即愈神效小兒疳積並痢方雞肫皮炒黃色為末每服一錢又治水瀉及脾胃虛弱以其能化食去積健胃故也雞肝散治疳積如神或為丸服亦可白芙蓉花陰乾