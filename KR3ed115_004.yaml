火文武而別降藥一名帝金丹水銀食鹽緑礬青者佳白礬火硝各一錢以上共為細末入傾銀小罐炭火煎滾變紅色取起候冷另置銅盆一個入水在內上加大碗一個將藥罐倒覆碗內紙燃塞口外用鹽泥封固另將草灰敷碗邊罐底露出加炭火其上打二炷香去火俟冷取起其藥降於碗底而色白者即此丹也九轉靈藥法水銀一斤鹽礬硝皂礬各八兩入陽城罐內鹽泥固濟約四分厚上蓋鐵盞鐵絲繞定鹽滷調磚漿粉封口三釘架起入菊花爐打火三香一香平底二香轉角三香齊藥再老半香取起謂之升火冷定開出去下面墜底者不用留取上面升起者仍用原鐵盞蓋好照前封固烘乾另將地掘一小孔埋陽成罐半截於內四圍原泥躋實架炭於陽城罐上截比鐵盞高三四寸從最高處發火約三香緩緩燒至與地平謂之降火再老半香退火冷定其不降者不用另取短陽城罐一個合在原罐之上封口照前打升火畢開出去底下陽城罐另換新罐封固照前打降火畢開出去上面陽城罐照前換下罐封打如是共九升九降畢取出細研再入小陽城罐每藥一兩上蓋石膏末一兩鐵盞蓋口照前封固上水下火打三香退火冷定開出取其升上者即靈藥也以少許掃膏藥上能去腐呼膿生肌收口神效其餘各轉所存之藥研入疥瘡藥內殺蟲如神打靈砂法水銀一斤硫黃四兩先將硫黃入鍋化開入水銀炒至不見星為度入陽城罐內鐵盞蓋口鹽泥封固架三釘菊花爐內上水下火打三香取起冷定開出其升上紫紅色者即靈砂也干蒸米露法松柏葉露花露俱同此法收久不壞鐵熬盤置灶上盤內貯砂三寸許砂上加銅鏇一面將米升許淘透入鏇內合上錫甑俟其滴出約半茶鍾而止不可多取恐有焦氣其米仍可煮飯造錫蒸法形如燒酒甑而不貯水內腰有槽傍通於滴口米氣上騰則露珠流入槽內而出下設子口二層內子口要與銅鏇緊緊相合不可走氣外子口套在銅鏇之外二子口約深半寸銅鏇約深二寸套上子口子口之上即系流露之槽要於出口處略底此錫甑連子口共高六寸不可太高頂如和尚頭各徑七寸俱木尺又法銅鏇深五寸許貯米合錫甑於上入重湯內大火久煮亦可取露竟無焦氣而露較多於前法制玄明粉法朴硝十斤長流水一石煎化澄去沙土熬至一半入盆內露一宿結成硝去水每硝二斤入蘿蔔切塊半斤加水煮熟去蘿蔔露一宿再換蘿蔔加水再煮再露或五七次九次再用甘草煮露一次每硝一斤甘草一兩去草以硝入沙罐內築實外用鹽泥固濟厚半寸許不蓋口以炭十斤先文後武化至沸候火盡冷定蓋口固濟以頂火十五斤煅至火盡冷定取出隔紙安地上盆覆三日去火毒研末每一斤入生甘末一兩炙甘末一兩和勻瓶貯制風化硝法以提淨芒硝置風日中消盡水氣自成輕飄白粉又法以粗瓦瓶盛硝掛當風檐下待硝滲出瓶外結成霜刮下收貯制瓜霜法朴硝一斤打碎老皮西瓜一個切去蓋去子留瓤入硝於內數日化成水再以此水入頂老王瓜內掛當風處約半月餘其外面起白霜每霜一錢入冰片一分用點風火時眼或吹入喉中治喉痹喉風無不神效升白靈藥法外科收口神藥黑鉛二兩化開投入水銀二兩聽用火硝二兩緑礬二兩白礬二兩上三味共碾為末炒乾入前黑鉛水銀拌勻入陽城罐內鐵盞蓋口鹽泥封固曬乾架三釘八卦爐內上水下火升打三香冷定開看如粉凝結盞底上刮下收貯聽用鍊金頂砒法用鉛一斤小罐內炭火煨化投白砒二兩於化煬鉛上煉煙盡為度取起冷定打開金頂砒結在鉛面上取下聽用取蟾酥法用蟾不拘大小其酥俱有用闊銅鑷鑷蟾眉稜高肉上微緊拔出酥來凝聚鑷里多則刮下陰乾聽用其取過之蟾避風兩日仍送青草中自然不傷其生如取後便見風下水俱成破傷風而死
