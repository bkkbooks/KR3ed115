body:
  text: 附急救門中草毒西涼嶺南一帶常有其患入咽欲死之急症馬兜鈴苗二兩為末溫水調服即愈菌毒笑不止及腹痛地漿水飲之即愈或嚼金銀花不吐自愈或乾花煎濃汁飲解鉤吻毒方俗名斷腸草取人糞汁或白鴨白鵝斷頭滴血入口中或羊血灌之亦好或蔥汁或甘葛汁或鵝蛋清皆可解中砒毒心腹絞痛欲吐不吐面青肢冷防風四兩煎湯服即解柏樹葉搗爛沖生白酒飲之即解楊梅樹皮煎湯二三碗服之愈用紫蝴蝶花根搗汁一碗灌下立愈用桐油灌之得吐即解解鴆鳥毒乾葛末井水調服解巴豆毒凡中此毒口渴面赤五心煩熱泄痢不止冷粥一碗服下即止解燒酒毒鍋蓋上氣水半鍾灌下即醒狗肉毒方杏仁二兩和皮研細熱湯拌勻分三盞服瀉出即愈牛肉毒方黃連甘草湯或單用大甘草煎服亦效如渴切勿飲水飲則難治解服鹽滷方生大黃二兩搗碎生腐漿一碗同搗數十下服後瀉數通再用生甘草汁一碗冷吃解大黃毒解鹽滷毒方生豆腐漿灌之或黃豆入水搗汁灌之或肥皂水灌之或羊血灌之立愈中蠱毒必效方芫荽根搗汁半升和酒服立下解蠱毒方玳瑁水磨濃汁服一盞即消解金蠶蠱毒凡中毒者以白礬試嘗之甘而不澀再以黑豆嚼之不腥即是急取石榴朝東根皮煎濃汁飲之即吐出活魚立愈中藥毒及中惡卒死急取鴨熱血灌入喉即活此方亦解河豚毒救五絕方一自縊二牆壓三溺水四魘魅五產後暈絕皆以半夏研細末冷水和丸如小豆大塞鼻中並用燥末吹耳內心溫者死一日猶可活此扁鵲活人法今人多因氣絕不救惜哉又方急於人中穴及兩足大指甲離一韭菜葉各灸三五壯即活又方但心頭溫者皆可救生半夏為末吹鼻可生一方皂角為末吹其耳鼻即活月蟾起死丹凡遇凶死灌之即活命盡者亦能淹留三五天如有命服丹追魂用藥調治三月三日向辰方取金絲大蝦蟆一個必前有五指者養至五月五日午時懸起陰乾勿令損壞候月蝕之夜以新盆盛水浸之於初蝕時入水蓋以新盆次早開視而蟾活矣以硃砂一兩搗萬下面東方丸之如梧子大死三日以內屍不壞者可救以水送下或溫酒挖開口灌之月蝕之日先以溫水浸蟾濕凡跌打縊溺心頭熱者急用大雄雞一隻割去冠血注鼻中即活打死暈倒在地立救可活血管鵝毛煅存性一錢乳香沒藥百草霜各一錢共為末老酒調服即醒救縊死法凡遇縊死者徐徐抱住急為解繩不可割斷取臥凳上緊挽其發一人摩其胸脅一人屈其臂及足脛待其氣回將雞冠血滴人口中即生縊死方取活鵝嘴插入喉中鵝鳴應聲即醒水溺死方一宿者尚可活紙裹皂莢末納糞門中須臾水出即活還魂草治卒中惡死吐痢不止不知何病不拘大小男女用馬糞一丸絞汁灌之乾者水煮亦可此扁鵲法也魘死並中惡方不可用火照但痛咬其腳根即蘇或皂角末吹鼻中嚏出即活救荒門諸葛乾糧白茯苓二斤乾薑一兩黃米二升山藥一斤白麵二斤麻油半斤芡實三斤各藥一處蒸熟焙乾為末每服一匙新汲水下日進一服氣力如湧一日不飢渴行軍辟穀方李衛公大黃豆五斤淘三遍至極淨去皮為末麻子仁三斤綿布包用滾沸湯浸至冷取垂井中一宿勿令著水次日曬乾新瓦上撥出殼簸揚取粒粒皆完者蒸三遍為末白茯苓六兩糯米五升淘淨與茯苓同蒸為末先將麻仁糯米茯苓共搗極爛漸加豆末和勻捏如拳大塊復入甑蒸之約三個時辰冷定取出曬乾為末每用麻子汁調服以飽為度不得吃一切諸物第一頓一月不飢第二頓四十九日不飢第三頓百日不飢第四頓一年不飢第五頓千日不飢永遠顏色日增氣力加倍如渴飲麻子汁或芝麻汁滋潤臟腑如欲吃飲食用葵菜子三合為末煎湯冷定服之下其藥再服稀粥一二日稠粥一二日方可飲食但服藥之後大忌房事慎之防飢救生四果丹栗子去殼紅棗去皮核胡桃去殼皮柿餅去蒂各等分入甑蒸二時取出石臼中杵搗不辨形色捻為厚餅曬乾收貯冬月吉日焚香修合凡飢者與食一餅茶湯任嚼服腹中氣足自飽一餅可耐五日再服不限日數此藥補腎水健脾土潤肺金清肝木而心火自平也辟穀仙丹熟地一斤九蒸九曬天冬二斤去心為末蜜丸彈子大曬乾每服二三丸溫酒化下日服三次服至十日身輕目明行路不餓芝麻一斤炒紅棗一斤蒸糯米一升炒共為末蜜丸彈子大每吃一丸水下一日不飢斬草丹備荒辟穀修道芝麻黑豆半升齊炒成黃色去了皮貫眾茯苓各四兩乾薑甘草亦如之棗肉為丸錢來大走遍山川不忍飢試問山中青苗草管教入口化為泥生津止渴丸烏梅肉二斤檀香三錢白豆蔻五錢薄荷三兩甘葛二兩飛鹽一兩紫蘇一兩花粉三兩為細末煉蜜為丸圓眼大渴即噙化一顆能止渴救荒丹與辟穀少異黑豆五升洗淨蒸三遍曬乾去皮為末火麻子三升湯浸一宿撈出曬乾用牛皮膠水拌曬去皮淘淨蒸三遍碓搗漸次下黑豆末和勻用糯米粥為丸如拳大入甑蒸從夜至子住火至寅取出曬乾瓷器內盛蓋不令見風每服三塊但飽為度不得食一切物第一頓七日不飢第二頓四十九日不飢第三頓百日不飢容顏佳勝更不憔悴渴即研火麻子漿飲之滋潤臟腑若要重吃物用葵子三合杵碎煎湯飲開通胃脘再以薄粥飲數次然後飲食則無礙矣守山乾糧紅蘿菔洗淨蒸熟俟半乾搗爛糯米舂白浸透蒸飯搗如糊入紅蘿菔等分搗勻泥竹壁上待其自干愈久愈堅不蛀不爛如遇荒年鑿下手掌大一塊可煮成稀粥一大鍋食之且耐飢或做成土坯樣砌牆亦可服黃精法黃精根梗不拘多少細銼陰乾為末水調服初服不可多恐飽脹以後漸漸加多飢則再服可以不食渴則飲水一年之久可變老為少身輕善走又法黃精蒸熟曬乾為末另用生黃精切碎熬膏搗成丸雞子大日服三次每次一丸可以絕食不飢渴則飲水兼除百病怪症門血餘症十指皆斷壞惟有筋連每節內蟲出如燈心長數寸遍身綠毛用胡黃連白茯苓赤茯苓等分每服三錢水煎服愈又血餘症口生肉球有根如線吐出乃能飲食捻之痛入心用麝香水研服三日根化即愈臍蟲腹中如鐵石臍內出水旋變作蟲行繞身體其癢難忍𢬶撥不盡用蒼朮為末入麝少許水調服又將蒼朮煎濃湯浴之離魂症臥時覺身外有一身一樣無別但不言語名曰離魂蓋臥則魂歸於肝肝虛邪襲魂不歸舍也用人參二錢龍齒二錢赤茯苓一錢水煎濾清調飛過硃砂一錢睡時溫服每夜一服三日後魂歸氣爽渾身蝨陣臨睡渾身蝨出約至四五升隨致血肉俱壞每宿漸多癢極難言惟飲水臥床晝夜號哭舌尖出血不止身齒俱黑唇動鼻開用鹽醋湯飲之十日即愈有蟲如蟹走於皮下作聲若兒啼是為筋肉之化用雷丸雄黃等分為末摻豬肉上炙服自安脈溢毛竅出血不止皮脹如鼓須臾口鼻耳目被氣脹合用薑汁飲之自安眉毛動搖目不能交睫喚之不應但能飲食用大蒜搗汁酒調飲愈傷寒狂走雞子殼出過小雞者煎湯服即醒夜多惡夢好硃砂大塊者帶在頭上便解水明內視一人閉目即內見臟腑頭眩心悸三月不能寐一醫人以大甘草作丸與服數日漸瘥人問其故醫曰內經不雲水明內視乎甘草色黃味甘土也吾以土剋水故勝之反經上行方婦人經時眼血如狂雨用紅花桃仁歸尾等分煎湯服破血下行即愈意痛毛男女大腳指縫中生毛拂著痛不可忍用桐油煎滾乘熱滴入一點於患處毛即脫忍痛少頃無恙鼻繩一人鼻中出毛晝夜一二尺漸漸粗圓如繩痛不可忍摘去更生此飲食豬羊血過多而然也用硼砂乳香等分飯為丸水下十粒早晚各一服病去乃止灸瘡飛肉一人因艾灸訖火痂便落瘡內鮮血片片如蝴蝶樣騰空飛去痛不可忍此是血肉俱熱之故用大黃芒硝等分為末水調下微利即愈發斑發硬一人眼赤鼻漲大喘渾身出斑發如銅鐵絲硬乃熱毒結於下焦也用白礬滑石各一兩水三碗煎一碗半不住口飲數服乃愈血擁一人遍身肉出如錐癢痛不能飲食名血擁用赤皮蔥燒灰水淋汁洗內服淡豆豉湯數盞而愈空中見禽一人眼前常見禽鳥飛去捉之即無乃肝膽經多痰用棗仁羌活玄明粉青葙子各一兩為末每次水煎二錢一日三服垂睛一人眼珠垂下至鼻大便血出名肝脹用羌活水煎服數次即愈應聲蟲一人腹內有物作聲隨人言語名應聲蟲服雷丸即愈或用板藍汁一盞飲油一人飲油五升方快意乃發入胃血裹化蟲也用雄黃五錢水調服失物望一人臥於床四肢不動只進飲食好大言說吃物謂之說失物望病如說某肉即以某肉與看不與食失他物望也睡中流出饞涎即愈血潰一人眼內白眥俱黑見物依舊毛髮直如鐵條不語如醉名曰血潰延醫治之百藥不效後遇一道人云此症可治因拜求之遂令用五靈脂酒調下二錢而愈傷寒並熱霍亂一人氣喘不能言口中流涎吐逆齒皆搖動氣出轉大即悶絕名傷寒並熱霍亂用大黃人參各五錢水三盞煎一盞服肉刺一人手足甲忽然長倒生肉刺如錐食葵菜自愈白寒瘡一人面上及遍身生瘡似貓兒眼有光彩無膿血冬則近脛名曰白寒瘡多食魚雞蔥韭而愈脅破腸出一人脅破腸出臭穢難當急以香油扶腸送入即不出以人參枸杞子煎湯淋之皮自合吃豬腎粥十餘日愈或羊腎亦可氣結堅硬一人口鼻中氣出盤旋不散凝似黑雲過十日漸至肩與肉相連堅勝鐵石無由飲食多因瘧後得之用澤蘭水煎日飲三杯五日而愈蛇光熱一人頭面發熱有光色他人手近如火炙用蒜汁半兩酒調下吐物如蛇遂安肉化石一人渾身生泡如甘棠梨破則出水內有石一片如指甲大其泡復生抽盡肌肉不可治矣急則用三稜莪朮各五兩為末分三服酒下交腸一人小便出屎大便出尿名交腸用舊幞頭燒灰酒下五分愈腎漏一人陽舉不痿精流無歇時痛如針刺為腎漏用韭菜子破故紙各一兩為末每服三錢水煎日三服即止肉腫如蛇一人身及頭面肉腫如蛇狀用濕磚上青苔一錢水調塗立消大腸蟲一人大腸內出蟲不斷斷而復生行坐不得用鶴蝨末水調服五錢即愈小兒流水一小兒初生如魚泡又如水晶碎則流水用密陀僧研細末摻之愈兒生無皮一小兒初生遍身無皮俱是赤血肉掘土坑臥一宿長皮或用白早米粉干撲於身上候生皮乃止斷皮一人項上生瘡如櫻桃有五色瘡破則項皮斷逐日飲牛乳自消肉人一人自項至前陰後尻尾皮肉裂開如刀割一條痛不可忍一道人云是肉人症教飲牛乳而愈厚皮一人大指忽麻木皮厚如裹鍋巴一道人教用苦參用酒煎吃外敷苦參末而愈後本人見一女子遍身患皮厚同上即服苦參酒外敷苦參末數斤而愈四肢如石一人寒熱不止四肢如石擊之如鐘聲日漸消瘦用茱萸木香等分水煎一二服即愈截腸一人大腸頭出寸余候乾自落落後又出名截腸病用芝麻油器盛坐洗之飲火麻子汁數升愈肉壞一人鼻腥臭水流以碗盛而視之有鐵色蝦蟆如米大走躍捉之即化為水此肉壞矣食雞肉一日兩次一月而愈冷熱相吞一人兩足心凸腫硬如釘脛骨生碎孔流髓身發寒戰惟思飲酒此肝腎氣冷熱相吞用川烏炮為末敷之內煎韭菜湯服之愈筋解一人四肢節脫但有皮連不能舉動名曰筋解用黃蘆酒浸一宿焙為末酒下二錢多服即安喉肉腫臭一人喉間生肉層層相疊漸腫起有竅出臭氣用臭橘皮葉煎服即愈人面瘡昔人患人面瘡於臂上滴灑瘡口即面赤與物食之即肉脹獨與貝母則斂眉閉口若苦楚狀乃煎貝母以葦筒灌之數日即愈肺痿一婦人年二十餘胸生一竅口中吐膿血與竅相應而出此肺痿也用人參黃耆當歸加退熱排膿之劑而愈蛇瘕一人患蛇瘕乃蛇精之液沾菜上人誤食之腹內成蛇或食蛇亦有此症其人常飢食之即吐用赤頭蜈蚣一條炙末分二次酒下蛟龍瘕蛟龍瘕寒食飯三升每服五合日三服吐出蛟龍而愈鱉瘕鱉瘕痛有來止或食鱉即痛用雞屎一升炒投酒浸一宿焙乾為末原浸酒調下雞瘕雞瘕有病冷痰者是因食白淪雞過多所致用蒜一枚煮服乃吐一物如升大痰裹開視乃雞雛也再服吐十三雞雛而愈傷胞一婦人產後有傷胞破不能小便常漏濕不幹用生絲絹一尺剪碎白牡丹根皮一錢白芨末一錢水煎至絹爛如餳空心頓服不得作聲作聲即不效屍厥氣走如雷一人屍厥奄然死去腹中氣走如雷用硫黃一兩焰硝五錢細研分三服好酒煎覺煙起則止溫灌之片時再服而安瘡如蛇一人生瘡如蛇出數寸用雄黃塗之即消視物倒植一人眼中視物倒植用藜蘆栝蒂為粗末水煎服吐而愈見獅子一人患疾見物如獅子伊川教以用手直前捕之見其無物久久自愈見蓮花一人見滿壁皆蓮花以礞石滾痰丸下之而愈乳懸一婦人產後忽兩乳細小下垂過腹痛甚名乳懸用川芎當歸各二斤納半斤水煎服余藥燒煙薰乳口鼻二料乃愈仍以蓖麻一粒貼其頂心肉線出一婦人產後水道出肉線一條長三四尺動之則疼痛欲絕先服失笑散數服次以帶皮姜三斤搗爛入清油二斤煎油干為度用絹兜起肉線屈曲於水道旁以前姜薰之冷則熨之一日夜縮其大半二日則盡入再服失笑散芎歸湯調理而愈如肉線斷不可治矣慎之灸火血出一人灸火至五壯血出一縷急如溺手冷欲絕以酒炒黃芩二錢酒下即止頭出蛆一人頭皮內時有蛆出以刀切破皮用絲瓜葉擠汁搽之蛆出盡絕根痘爛生蛆一小兒痘爛生蛆以柳條帶葉鋪地將兒臥其上蛆盡而愈疽發有聲一人淵疽發於肋下久則一竅有聲如嬰兒啼灸陽陵泉二七壯聲止而愈指節斷落一人手指彎曲節間痛不可忍漸至斷落以蓖麻子二兩去殼碎者不用黃連四兩貯瓶內水二升浸之春夏三日秋冬五日每早面東以此水吞下蓖麻子一粒加至四粒微泄無害忌食動風發物屢效腦風一人患頭風症耳內常鳴頭上有啾啾鳥雀聲此頭腦夾風也用川芎當歸湯而愈舌出一人傷寒舌出寸余連日不收用楊花腦抹舌上應手而收重者五錢方愈木舌脹滿一婦人木舌脹滿口諸藥不效以排針砭之五七度腫減三日方平血出盈斗子母蟲一婦人忽生蟲一對於地能行長寸余自此以後月生一對醫以苦參加蟲藥為丸服之又生一對埋於土中過數日發而視之其暴大如拳名曰子母蟲從此絕根奶頭裂一人奶頭裂尋秋後嫩茄子裂開頭者陰乾焙為末水調服紅點一男子每至秋冬遍身發紅點發癢此寒氣收斂腠理陽氣不能發越炥郁內作也宜以人參敗毒散解表再以補中益氣湯實里而愈紫泡一人因剝牛瞀悶昏暈遍身俱紫泡急刺其泡處良久遂蘇更服解毒藥而愈腦疽頭腫一人患腦疽面目腫閉頭焮如斗此膀胱濕熱所致以黃連消毒飲二劑又服槐花酒二碗頓退以指按下腫即復起此膿已成也頸額肩各刺一孔膿並湧出口目始開更以托裡散加金銀花連翹三十劑愈紅絲瘤李叔和問東垣曰中年得一子一歲後身生紅絲瘤而死四子皆然何也東垣曰汝乃腎中伏火精內有紅絲故也俗名胎瘤取精觀之果如其言遂以滋腎丸數劑其妻服六味地黃丸乃受胎生子前證不復作矣產後身冷一婦產後日食茶粥二十餘碗一月後遍身冰冷數塊人以指按其冷處即冷從指上下應至心如是者二年諸治不效以八物湯去地黃加橘紅入薑汁竹瀝一酒鍾十服乃溫聞雷昏倒一小兒七歲聞雷則昏倒不知人事以人參歸身麥冬少加五味子熬膏盡一斤後聞雷自若飲食別下一人飲食若別有咽喉斜過膈下徑達左脅而作痞悶以手按之則瀝瀝有聲以控涎丹十粒服之少時痞處作熱有聲泄下痰飲二升飲食正達胃矣三陰交出血一婦三陰交無故血出如射將絕以指按其竅縛以布條昏倒不知人事以人參一兩煎湯灌之愈頸腫連頭一人頸項與頭相統按之堅硬用漏蘆湯一劑服下發癢頃刻消散身發癢一人田間收稻忽然遍身癢入骨髓用食鹽九錢湯泡三碗每進一碗探而吐之三探三吐而愈小兒身癢一小兒遍身癢以生薑搗爛布擦之而止盤腸產一盤腸產者臨產子腸先出而後產子產後而腸不收用醋半盞冷水七分調勻噴婦人面三噴三收其腸收盡此良方也產戶下物如帕丹溪治一產婦產戶下一物如帕有尖約重一斤卻喜血不盡虛急以人參歸身各一錢耆朮升麻各五分水煎連服三帖即收上陽腫痿一少年陽物挺長腫而痿皮塌常潤磨股難行兩脅氣衝上手足倦弱先以小柴胡湯加黃連大劑行其濕熱少加黃柏降其逆上之氣腫漸收莖中硬塊未消以青皮為君佐以散風之藥為末服之外用絲瓜汁調五倍子末敷之愈喘嘔煩亂一病人似喘不喘似嘔不嘔似噦不噦心中憒憒然無奈醫人用半夏半斤生薑汁一升水三升先煎半夏至二升入薑汁共煎至一升半少冷分四服日三服夜一服病止停服夏月中寒一人暑月行百里渴飲山水至晚以單席陰地上少睡頃間寒熱吐瀉身如刀刮而痛醫皆作暑治進黃連香薷飲不效予診其脈細緊而伏此中寒也眾醫俱笑予以附子理中湯大服乃濟冬天中暑一婦人冬月患惡寒發熱惡食乾嘔大便欲去不去諸醫皆以虛弱用滌痰二味湯不效後請予治脈虛無力類乎傷暑眾以為不然予究之婦曰昨因天寒取綿套之因得此症予曰誠哉傷暑也汝之綿套曬之盛暑熱收箱中必有暑氣今體虛得之易入故病如是婦曰然用黃連香薷飲進二服其病瘳矣噫冬中暑夏中寒病亦鮮見問切之功活變之法不可不知也紅絲瘡此症起於手者頃刻紅絲長至胸瘡起於足頃刻紅絲到腹死在旦夕初起時兩頭繩線縛住紅絲即將瘡頭刺出毒血嚼浮萍草敷之愈蚌珠患蚌珠以河蚌蛤水養淨對剖取肉半個貼患處蚌肉熱又換貼數次即愈又治內蚌珠取老蚌一個水養淨輕輕取起放於干處俟其開口即入冰片末數分露一宿化為水傾入患處以小盆盛接再傾進之三次即愈如無蚌用大田螺亦可兼治耳病並痔瘡人面瘡人面瘡以精豬肉一片重三四兩摻貝母末貼每日一換換時以豬肉蜂窠煎湯洗二十日後用乳香沒藥白石脂血竭黃連黃柏各一錢螵蛸三分共末摻患處舌脹滿口用蒲黃乾薑各等分為末乾擦即愈舌腫不能言用蓖麻子四十粒紙上取油將油紙燃燒煙薰舌即消舌出血用薰鼻中自止齒縫血條齒中出血如條繫上熱下虛內用防風羌活黃連人參茯苓麥冬煎服外用香附青鹽百草霜骨碎補各等分為末擦之其香附須用生薑汁製過血汗出汗紅色者血自毛孔中出即飢衄又名脈溢乃虛弱極有火之症也用人參歸身黃耆服之又建中湯辰砂妙香散皆宜如抓傷血絡血出不止以人參一兩服之毛孔節次血出不止則皮脹如鼓須臾口鼻脹合名曰脈溢又用生薑汁和井水各半服之立效黑丹方人面忽生黑丹如芥子狀不治患將遍身即死鹿角燒灰存性豬油調敷愈
